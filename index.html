<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIQSCAN v4 CELU+ — Binance Futures</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204;
            --bg2: #06060a;
            --bg3: #09090f;
            --border: #141424;
            --border2: #1a1a2e;
            --text: #ffffff;
            --text2: #6666aa;
            --text3: #444466;
            --cyan: #00e5ff;
            --yellow: #ffd700;
            --magenta: #ff00cc;
            --orange: #ff6b00;
            --green: #00ff88;
            --purple: #7c3aed;
        }
        /* Estilos generales simplificados para mantener la estructura original */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
        }
        .badge-absorcion { color: var(--magenta); animation: pulse 1.5s infinite; }
        .badge-mecanico { color: var(--purple); }
        .badge-climax { color: red; }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="scanner-container">
        <h2>LIQSCAN // BINANCE FUTURES <span style="color:var(--orange);">V4 CELU+</span></h2>
        
        <div class="filtros-v4" style="margin-bottom: 20px; font-size: 12px;">
            <span style="color: var(--magenta);">■ FILTROS v4:</span>
            <label><input type="checkbox" checked> ABSORCIÓN CVD</label>
            <label><input type="checkbox" checked> OI MECÁNICO</label>
            <label><input type="checkbox" checked> CLIMAX SHORT TRAP</label>
        </div>

        <table style="width: 100%; text-align: left; border-collapse: collapse;">
            <thead>
                <tr style="color: var(--text2); font-size: 11px; border-bottom: 1px solid var(--border2);">
                    <th>TOKEN</th>
                    <th>PRECIO</th>
                    <th>24H %</th>
                    <th>FUNDING</th>
                    <th>OI (USDT)</th>
                    <th>WHALE</th>
                    <th>CVD</th>
                    <th>VOL</th>
                    <th>STOCH K</th>
                    <th>VWAP</th>
                    <th>ADX</th>
                    <th>SCORE L/S</th>
                    <th>SEÑAL CELU V4</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        // Variables globales de tu sistema original
        let alertHist = [];
        let prevSS = {};
        let prevAg = new Set();
        let prevCl = new Set();
        let unrl = 0;
        let unrS = 0;

        function clearAlerts() {
            alertHist = []; prevSS = {}; prevAg = new Set(); prevCl = new Set();
            unrl = 0; unrS = 0; updAT(); renderAlerts(); showTo();
        }

        // Tu función exacta de la captura de pantalla de GitHub sin tocar una sola letra
        function checkScanAlerts(data) {
            if (!data) return;
            data.forEach(d => {
                if (d.error) return;
                const s = calcSetup(d), sym = d.symbol, prev = prevSS[sym], nT = s.type;
                if (nT && nT !== 'neutral' && nT !== prev) {
                    let det = '';
                    if (nT === 'wlong') det = 'Whale BUY + StochRSI + VWAP - posible LONG';
                    else if (nT === 'wshort') det = 'Whale SELL + StochRSI + VWAP - posible SHORT';
                    else if (nT === 'absorcion') det = 'Precio↑ pero CVD↓ ' + d.absorcionPct.toFixed(0) + '% - rally falso, vendedores absorbiendo';
                    else if (nT === 'mecanico') det = 'OI cayó ' + Math.abs(d.oicaida).toFixed(1) + '% mientras precio sube - movimiento por liqui';
                    else if (nT === 'climax') det = 'Liq shorts $' + fmtBig(d.shortLiqs) + ' en 5min - agotamiento vendedores, posible reversa';
                    
                    if (det) { addAlert(nT, sym, det, d.price); prevSS[sym] = nT; }
                }
            });
        }

        // Funciones auxiliares mockeadas para que el script original no tire error si faltan piezas
        function calcSetup(d) { return { type: d.setupType || 'neutral' }; }
        function addAlert(type, sym, det, price) { console.log(`Alerta [${type}] en ${sym}: ${det} a $${price}`); }
        function fmtBig(val) { return val ? (val / 1000).toFixed(1) + 'K' : '0'; }
        function updAT() {} function renderAlerts() {} function showTo() {}
    </script>


    <script>
    (function() {
        // 1. Estilos Visuales del Medidor v4 encapsulados
        const style = document.createElement('style');
        style.innerHTML = `
            .celu-gauge-wrapper {
                background: #07070d;
                border-left: 2px solid var(--cyan, #00e5ff);
                border-top: 1px solid var(--border, #1a1a2e);
                padding: 20px;
                font-family: "Share Tech Mono", monospace;
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 24px;
                animation: fadeIn 0.25s ease forwards;
            }
            .celu-gauge-left {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: relative;
            }
            .celu-svg-space {
                width: 220px;
                height: 120px;
            }
            .gauge-bg { fill: none; stroke: #141424; stroke-width: 12; stroke-linecap: round; }
            .gauge-fill { 
                fill: none; stroke: #444466; stroke-width: 12; stroke-linecap: round; 
                stroke-dasharray: 314; stroke-dashoffset: 314;
                transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
            }
            .gauge-needle {
                fill: #fff;
                transform-origin: 120px 120px;
                transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .gauge-labels {
                position: absolute;
                bottom: 2px;
                width: 85%;
                display: flex;
                justify-content: space-between;
                font-size: 10px;
                color: #444466;
                font-weight: 700;
            }
            .gauge-text-center {
                text-align: center;
                margin-top: -10px;
            }
            .gauge-title-top {
                font-size: 11px;
                color: #6666aa;
                letter-spacing: 2px;
                margin-bottom: 8px;
                text-transform: uppercase;
                font-family: "Barlow Condensed", sans-serif;
                font-weight: 600;
            }
            .celu-gauge-right {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .celu-card-mini {
                background: #09090f;
                border: 1px solid #141424;
                padding: 8px 12px;
                border-radius: 2px;
                display: flex;
                flex-direction: column;
            }
            .celu-card-full {
                grid-column: 1 / -1;
                background: rgba(124, 58, 237, 0.03);
                border: 1px dashed #252540;
                padding: 10px 12px;
                border-radius: 2px;
            }
            .cm-lbl { font-size: 9px; color: #6666aa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
            .cm-val { font-family: "Barlow Condensed", sans-serif; font-size: 16px; font-weight: 700; color: #fff; }
            .cm-desc { font-size: 9px; color: #444466; margin-top: 1px; }
            
            .color-n1 { color: #00e5ff !important; }
            .color-n2 { color: #ffd700 !important; }
            .color-n3 { color: #ff00cc !important; }
            .bg-n1 { stroke: #00e5ff !important; }
            .bg-n2 { stroke: #ffd700 !important; }
            .bg-n3 { stroke: #ff00cc !important; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        `;
        document.head.appendChild(style);

        // 2. Procesador Cuantitativo de Variables (Extrae de la fila madre de la tabla)
        function extraerMecanicaFila(trNode) {
            const fndTxt = trNode.querySelector('td:nth-child(4)')?.innerText || "+0.0000%";
            const whlTxt = trNode.querySelector('td:nth-child(6)')?.innerText || "1.0x";
            const adxTxt = trNode.querySelector('td:nth-child(11)')?.innerText || "15";
            const sigTxt = trNode.querySelector('td:nth-child(13)')?.innerText || "";

            const funding = parseFloat(fndTxt.replace('%', '')) || 0;
            const adx = parseFloat(adxTxt) || 0;
            const whale = parseFloat(whlTxt.replace('x', '')) || 1.0;
            
            const absorcion = sigTxt.includes("ABSORCIÓN") || trNode.querySelector('.badge-absorcion') !== null;
            const mecanico = sigTxt.includes("MECÁNICO") || trNode.querySelector('.badge-mecanico') !== null;
            const climax = sigTxt.includes("CLIMAX") || trNode.querySelector('.badge-climax') !== null;

            // Clasificación estricta según tus notas manuscritas
            let nivel = 1;
            let confianza = 30;
            let desc = "SEÑAL DÉBIL · NO HAY RASTRO INSTITUCIONAL O VOLUMEN APAGADO · PELIGRO PARA SHORT";
            let cClass = "color-n1";
            let sClass = "bg-n1";
            let fndEst = "NORMAL CON EUFORIA";
            let adxEst = "TENDENCIA EN DESARROLLO";

            // Regla de Oro Nivel 3: Short Premium
            if (funding > 0.050 || adx >= 50 || whale >= 3.0 || absorcion || climax) {
                nivel = 3;
                confianza = 90;
                desc = "[CLÍMAX ABSOLUTO] BALLENA INYECTANDO BLOQUES DE VENTA · RETAIL ATRAPADO EN TECHO · ALTA PROBABILIDAD DE REVERSIÓN VIOLENTA";
                cClass = "color-n3";
                sClass = "bg-n3";
                fndEst = "EUFORIA EXTREMA (SQUEEZE RISK)";
                adxEst = "CLÍMAX ABSOLUTO DEL MOVIMIENTO";
            } 
            // Regla Nivel 2: Trade Estándar
            else if ((funding >= 0.0010 && funding <= 0.0100) || (adx >= 30 && adx < 50) || (whale >= 1.5 && whale < 3.0) || mecanico) {
                nivel = 2;
                confianza = 65;
                desc = "TRADE MADURO POR AGOTAMIENTO PURO · TRADERS MINORISTAS ATRAPADOS ARRIBA · BUEN R:R AL POC/TP";
                cClass = "color-n2";
                sClass = "bg-n2";
                fndEst = "NEUTRAL / MINORISTAS ATRAPADOS";
                adxEst = "TENDENCIA FUERTE Y MADURA";
            }

            return { nivel, confianza, desc, cClass, sClass, fndTxt, fndEst, adx, adxEst, whale, absorcion, climax, mecanico };
        }

        // 3. Observer para detectar la apertura del Contenedor de Gráficos original
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1 && node.classList.contains('heatmap-container')) {
                        
                        if (node.querySelector('.celu-gauge-wrapper')) return;

                        let trMadre = node.closest('tr');
                        if (!trMadre) {
                            let subtr = node.parentNode;
                            while (subtr && subtr.tagName !== 'TR') { subtr = subtr.parentNode; }
                            trMadre = subtr ? subtr.previousElementSibling : null;
                        }
                        if (!trMadre) return;

                        const mt = extraerMecanicaFila(trMadre);

                        const offsetMap = 314 - ((mt.confianza / 100) * 314);
                        const degMap = ((mt.confianza / 100) * 180) - 90;

                        const wrapper = document.createElement('div');
                        wrapper.className = 'celu-gauge-wrapper';
                        wrapper.innerHTML = `
                            <div class="celu-gauge-left">
                                <div class="gauge-title-top">AGOTAMIENTO / ABSORCIÓN</div>
                                <svg class="celu-svg-space" viewBox="0 0 240 130">
                                    <path class="gauge-bg" d="M 20 120 A 100 100 0 0 1 220 120" />
                                    <path class="gauge-fill ${mt.sClass}" d="M 20 120 A 100 100 0 0 1 220 120" style="stroke-dashoffset: ${offsetMap};" />
                                    <g class="gauge-needle" style="transform: translate(120px, 120px) rotate(${degMap}deg);">
                                        <polygon points="-4,0 4,0 0,-95" fill="#ffffff" />
                                    </g>
                                    <circle cx="120" cy="120" r="6" fill="#fff" />
                                </svg>
                                <div class="gauge-text-center">
                                    <span style="font-size: 9px; color: #6666aa; letter-spacing: 1px;">CONFIANZA DE GIRO</span>
                                    <div style="font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; line-height:1;" class="${mt.cClass}">${mt.confianza}% (N${mt.nivel})</div>
                                </div>
                                <div class="gauge-labels"><span>N1</span><span>N2</span><span>N3</span></div>
                            </div>
                            <div class="celu-gauge-right">
                                <div class="celu-card-mini">
                                    <span class="cm-lbl">ADX CRÍTICO</span>
                                    <span class="cm-val ${mt.cClass}">${mt.adx}</span>
                                    <span class="cm-desc">${mt.adxEst}</span>
                                </div>
                                <div class="celu-card-mini">
                                    <span class="cm-lbl">FUNDING RATE</span>
                                    <span class="cm-val" style="color: #ffd700;">${mt.fndTxt}</span>
                                    <span class="cm-desc">${mt.fndEst}</span>
                                </div>
                                <div class="celu-card-mini">
                                    <span class="cm-lbl">VOL WHALE MULTIPLIER</span>
                                    <span class="cm-val" style="color: #ff6b00;">${mt.whale}x</span>
                                    <span class="cm-desc">${mt.whale >= 3.0 ? 'INYECCIÓN CRÍTICA' : mt.whale >= 1.5 ? 'FLUJO INSTITUCIONAL' : 'COMPORTAMIENTO PASIVO'}</span>
                                </div>
                                <div class="celu-card-mini">
                                    <span class="cm-lbl">DETECTOR V4 STATUS</span>
                                    <span class="cm-val" style="color: #fff;">${mt.absorcion ? 'ABSORCIÓN CVD' : mt.mecanico ? 'OI MECÁNICO' : mt.climax ? 'CLIMAX TRAP' : 'NEUTRAL'}</span>
                                    <span class="cm-desc">MECÁNICA DE FLUJO DE ÓRDENES</span>
                                </div>
                                <div class="celu-card-full">
                                    <span class="cm-lbl" style="color: #7c3aed">DIAGNÓSTICO ESTRATÉGICO CELU v4</span>
                                    <div style="font-size: 10px; color: #c8c8e0; line-height: 1.3; margin-top: 3px; font-weight: 400;">${mt.desc}</div>
                                </div>
                            </div>
                        `;
                        node.appendChild(wrapper);
                    }
                });
            });
        });

        const target = document.getElementById('table-body');
        if (target) { observer.observe(target, { childList: true, subtree: true }); }
    })();
    </script>
</body>
</html>
