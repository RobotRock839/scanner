<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIKE_SCANNER · Techo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root{
        --bg-void:#05060a;
        --bg-panel:#0b0d14;
        --bg-panel-2:#10121b;
        --line:#1b1e2b;
        --line-soft:#141620;
        --text:#e2e4f1;
        --text-dim:#565c74;
        --text-faint:#31344a;
        --danger:#ff3b5c;
        --danger-glow:rgba(255,59,92,.45);
        --safe:#00e0a4;
        --gold:#f2b705;
    }
    *{box-sizing:border-box;}
    body{
        background:
            radial-gradient(circle at 15% 0%, rgba(255,59,92,.06), transparent 40%),
            radial-gradient(circle at 85% 100%, rgba(0,224,164,.05), transparent 40%),
            var(--bg-void);
        color:var(--text);
        font-family:'JetBrains Mono', monospace;
        min-height:100vh;
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:32px 16px;
    }
    .terminal{
        width:100%;
        max-width:460px;
        background:var(--bg-panel);
        border:1px solid var(--line);
        border-radius:10px;
        overflow:hidden;
        box-shadow:0 30px 60px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
    }
    .term-bar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:11px 16px;
        background:var(--bg-panel-2);
        border-bottom:1px solid var(--line);
    }
    .dots{display:flex;gap:6px;}
    .dots span{width:9px;height:9px;border-radius:50%;background:var(--text-faint);}
    .term-title{
        font-size:12px;
        font-weight:700;
        letter-spacing:.12em;
        color:var(--text-dim);
    }
    .term-title b{color:var(--text);}
    .status{
        display:flex;
        align-items:center;
        gap:6px;
        font-size:10px;
        font-weight:600;
        letter-spacing:.14em;
        color:var(--text-faint);
    }
    .status-dot{
        width:6px;height:6px;border-radius:50%;
        background:var(--text-faint);
    }
    .status-dot.on{background:var(--safe);box-shadow:0 0 8px var(--safe);}

    .term-body{padding:20px;}

    .input-row{
        display:flex;
        gap:8px;
        margin-bottom:10px;
    }
    .input-wrap{
        flex:1;
        display:flex;
        align-items:center;
        gap:8px;
        background:var(--bg-void);
        border:1px solid var(--line);
        border-radius:7px;
        padding:0 12px;
    }
    .input-wrap span{color:var(--gold);font-weight:700;}
    #sym{
        flex:1;
        background:transparent;
        border:none;
        outline:none;
        color:var(--text);
        font-family:inherit;
        font-size:14px;
        font-weight:600;
        letter-spacing:.05em;
        padding:11px 0;
    }
    #sym::placeholder{color:var(--text-faint);}
    #btn{
        padding:0 18px;
        background:var(--text);
        color:var(--bg-void);
        border:none;
        border-radius:7px;
        font-family:inherit;
        font-size:12px;
        font-weight:800;
        letter-spacing:.1em;
        cursor:pointer;
        transition:transform .12s, background .12s;
    }
    #btn:hover{background:var(--gold);}
    #btn:active{transform:scale(.96);}

    #out{min-height:2px;}
    .empty-hint{
        font-size:11px;
        color:var(--text-faint);
        padding:6px 2px 2px;
        letter-spacing:.03em;
    }
    .err{
        margin-top:14px;
        padding:12px 14px;
        border:1px solid rgba(255,59,92,.3);
        background:rgba(255,59,92,.06);
        color:var(--danger);
        font-size:12px;
        border-radius:7px;
        letter-spacing:.02em;
    }

    .divider{
        height:1px;
        background:var(--line);
        margin:20px 0;
    }

    .label-row{
        display:flex;
        justify-content:space-between;
        align-items:baseline;
        margin-bottom:4px;
    }
    .eyebrow{
        font-size:10px;
        font-weight:700;
        letter-spacing:.16em;
        color:var(--text-dim);
    }
    .pair-tag{
        font-size:10px;
        font-weight:600;
        color:var(--text-faint);
        letter-spacing:.08em;
    }
    .price-value{
        font-size:36px;
        font-weight:800;
        color:var(--danger);
        text-shadow:0 0 18px var(--danger-glow);
        letter-spacing:-.01em;
        line-height:1.1;
        margin-top:2px;
    }

    .chart-wrap{
        position:relative;
        margin:22px 0 6px;
        padding-top:22px;
    }
    .wall-tag{
        position:absolute;
        top:0;
        transform:translateX(-50%);
        font-size:9px;
        font-weight:700;
        letter-spacing:.1em;
        color:var(--danger);
        white-space:nowrap;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:2px;
    }
    .wall-tag::after{
        content:'';
        width:1px;
        height:6px;
        background:var(--danger);
    }
    .gridlines{
        position:absolute;
        inset:22px 0 26px 0;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        pointer-events:none;
    }
    .gridlines div{
        height:1px;
        background:var(--line-soft);
    }
    .wallbar{
        position:relative;
        height:76px;
        display:flex;
        align-items:flex-end;
        gap:3px;
    }
    .wcol{
        flex:1;
        background:var(--text-faint);
        opacity:.4;
        border-radius:2px 2px 0 0;
        min-height:2px;
        transition:height .4s cubic-bezier(.2,.8,.2,1);
    }
    .wcol.top{
        background:var(--danger);
        opacity:1;
        box-shadow:0 0 14px var(--danger-glow);
        animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
        0%,100%{opacity:1;}
        50%{opacity:.55;}
    }
    .axis{
        display:flex;
        justify-content:space-between;
        margin-top:8px;
        font-size:9px;
        color:var(--text-faint);
        letter-spacing:.03em;
    }

    .metric-row{margin-top:22px;}
    .metric-head{
        display:flex;
        justify-content:space-between;
        align-items:baseline;
        margin-bottom:8px;
    }
    .metric-label{
        font-size:10px;
        font-weight:700;
        letter-spacing:.14em;
        color:var(--text-dim);
    }
    .metric-value{
        font-size:15px;
        font-weight:700;
        display:flex;
        align-items:center;
        gap:6px;
    }
    .gauge{
        display:flex;
        gap:3px;
        height:8px;
    }
    .gauge div{
        flex:1;
        border-radius:2px;
        background:var(--line-soft);
        transition:background .3s;
    }
</style>
</head>
<body>
<div class="terminal">
    <div class="term-bar">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="term-title"><b>SPIKE</b>_SCANNER</div>
        <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">IDLE</span></div>
    </div>
    <div class="term-body">
        <div class="input-row">
            <div class="input-wrap">
                <span>#</span>
                <input id="sym" placeholder="TOKEN — ej. BANK" autocomplete="off">
            </div>
            <button id="btn">RUN →</button>
        </div>
        <div class="empty-hint">Analiza el libro de órdenes de Binance Futures y ubica la pared de liquidez más densa por encima del precio.</div>
        <div id="out"></div>
    </div>
</div>

<script>
let prevRes = 0;
const RNG_PCT = 0.15;
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

function fmtPrice(p){
    if(p >= 100) return p.toFixed(2);
    if(p >= 1) return p.toFixed(4);
    return p.toPrecision(4);
}

async function run(){
    const raw = document.getElementById('sym').value.trim().toUpperCase();
    if(!raw) return;
    const pair = raw+'USDT';
    const out = document.getElementById('out');

    statusDot.className = 'status-dot';
    statusText.textContent = 'SCANNING…';

    try{
        const [tk, dep] = await Promise.all([
            fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${pair}`).then(r=>r.json()),
            fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${pair}&limit=1000`).then(r=>r.json())
        ]);

        if(!tk.lastPrice) throw new Error(`No se encontró el par ${pair} en Binance Futures.`);

        const price = +tk.lastPrice;
        const asks = dep.asks.map(a=>({p:+a[0], u:+a[0]*+a[1]})).filter(a=>a.p > price && a.p <= price*(1+RNG_PCT));

        const bucketSize = (price * RNG_PCT) / 20;
        const walls = Array.from({length: 20}, (_, i) => ({
            price: price + (i * bucketSize),
            usd: asks.filter(a => a.p >= price + (i*bucketSize) && a.p < price + ((i+1)*bucketSize)).reduce((s,a) => s+a.u, 0)
        }));
        const maxUsd = Math.max(...walls.map(w => w.usd), 1);
        const top = [...walls].sort((a,b) => b.usd - a.usd)[0];
        const topIndex = walls.indexOf(top);
        const res = (asks.reduce((s,a)=>s+a.u, 0) / tk.quoteVolume) * 100;
        const trendUp = res > prevRes;
        const resColor = res > 5 ? 'var(--safe)' : 'var(--danger)';
        const gaugeFilled = Math.min(Math.round(res*2), 10);
        const tagPct = ((topIndex + 0.5) / 20) * 100;

        out.innerHTML = `
            <div class="divider"></div>
            <div class="label-row">
                <div class="eyebrow">TECHO SPIKE · PARED MÁS DENSA</div>
                <div class="pair-tag">${pair}</div>
            </div>
            <div class="price-value">${fmtPrice(top.price)}</div>

            <div class="chart-wrap">
                <div class="wall-tag" style="left:${tagPct}%;">$${fmtPrice(top.usd)}</div>
                <div class="gridlines"><div></div><div></div><div></div><div></div></div>
                <div class="wallbar">${walls.map((w,i) => `<div class="wcol ${i===topIndex?'top':''}" style="height:${Math.max((w.usd/maxUsd)*76,2)}px"></div>`).join('')}</div>
                <div class="axis"><span>${fmtPrice(price)}</span><span>${fmtPrice(price*(1+RNG_PCT))}</span></div>
            </div>

            <div class="metric-row">
                <div class="metric-head">
                    <span class="metric-label">RESISTENCIA</span>
                    <span class="metric-value" style="color:${resColor}">${trendUp ? '▲' : '▼'} ${res.toFixed(2)}%</span>
                </div>
                <div class="gauge">${Array.from({length:10}, (_,i)=>`<div style="background:${i<gaugeFilled?resColor:'var(--line-soft)'}"></div>`).join('')}</div>
            </div>
        `;
        prevRes = res;
        statusDot.className = 'status-dot on';
        statusText.textContent = 'LIVE';
    }catch(err){
        out.innerHTML = `<div class="divider"></div><div class="err">⚠ ${err.message || 'Error al consultar Binance. Verifica el símbolo.'}</div>`;
        statusDot.className = 'status-dot';
        statusText.textContent = 'ERROR';
    }
}

document.getElementById('btn').onclick = run;
document.getElementById('sym').addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
</script>
</body>
</html>
