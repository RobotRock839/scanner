<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHO SPIKE — Pro</title>
<style>
    body{background:#07080d;color:#c8cae0;font-family:'Courier New',monospace;max-width:520px;margin:auto;padding:20px;}
    .box{background:#0e0f17;border:1px solid #1e1f2e;padding:20px;border-radius:12px;}
    .val{font-size:32px;font-weight:bold;color:#f04a5a;text-shadow:0 0 10px #f04a5a44;}
    .wallbar{height:60px;display:flex;align-items:flex-end;gap:3px;margin:20px 0;}
    .wcol{flex:1;background:#24263a;border-radius:2px;transition:0.3s;}
    .top{background:#f04a5a !important; animation: pulse 1.5s infinite; box-shadow: 0 0 10px #f04a5a;}
    @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.6; } 100% { opacity:1; } }
    .res-bar{height:10px;background:#141520;border-radius:5px;overflow:hidden;margin:8px 0;}
    #liq-bar{height:100%;width:0%;transition:1s;}
</style>
</head>
<body>

<div class="box">
    <input id="sym" placeholder="TOKEN (ej: BANK)" style="width:100%;padding:10px;background:#0e0f17;border:1px solid #333;color:#fff;">
    <button id="btn" style="width:100%;margin-top:10px;padding:10px;background:#5b7fff;color:#fff;border:none;cursor:pointer;">CALCULAR</button>
    
    <div id="out" style="margin-top:20px;"></div>
</div>

<script>
let prevRes = 0;
const RNG_PCT = 0.15;

async function run(){
    const raw = document.getElementById('sym').value.trim().toUpperCase();
    const pair = raw+'USDT';
    const [tk, dep] = await Promise.all([
        fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${pair}`).then(r=>r.json()),
        fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${pair}&limit=1000`).then(r=>r.json())
    ]);

    const price = +tk.lastPrice;
    const asks = dep.asks.map(a=>({p:+a[0], u:+a[0]*+a[1]})).filter(a=>a.p > price && a.p <= price*(1+RNG_PCT));
    
    // Agrupar en bloques
    const bucketSize = (price * RNG_PCT) / 20;
    const walls = Array.from({length: 20}, (_, i) => ({
        price: price + (i * bucketSize),
        usd: asks.filter(a => a.p >= price + (i*bucketSize) && a.p < price + ((i+1)*bucketSize)).reduce((s,a) => s+a.u, 0)
    }));

    const maxUsd = Math.max(...walls.map(w => w.usd));
    const top = [...walls].sort((a,b) => b.usd - a.usd)[0];
    const res = (asks.reduce((s,a)=>s+a.u, 0) / tk.quoteVolume) * 100;
    
    document.getElementById('out').innerHTML = `
        <div class="val">${top.price.toFixed(4)}</div>
        <div style="font-size:12px;color:#525470;">TECHO SPIKE · PARED MÁS DENSA</div>
        <div class="wallbar">${walls.map(w => `<div class="wcol ${w.price===top.price?'top':''}" style="height:${(w.usd/maxUsd)*50}px"></div>`).join('')}</div>
        <div>Resistencia: <span id="trend">${res > prevRes ? '📈' : '📉'}</span> ${res.toFixed(2)}%</div>
        <div class="res-bar"><div id="liq-bar" style="width:${Math.min(res*10, 100)}%; background:${res > 5 ? '#00c97a' : '#f04a5a'}"></div></div>
    `;
    prevRes = res;
}

document.getElementById('btn').onclick = run;
</script>
</body>
</html>
