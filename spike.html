<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐋 Cazador de Ballenas — Modo Fácil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root{
        --bg:#eef4ff;
        --card:#ffffff;
        --ink:#20263a;
        --ink-soft:#6b7290;
        --line:#e3e8f7;
        --blue:#3b82f6;
        --blue-soft:#dbe8ff;
        --green:#22c55e;
        --green-soft:#dcfce7;
        --yellow:#f59e0b;
        --yellow-soft:#fef3c7;
        --red:#ef4444;
        --red-soft:#fee2e2;
        --purple:#8b5cf6;
        --purple-soft:#ede9fe;
        --radius:20px;
    }
    *{box-sizing:border-box;}
    body{
        margin:0;
        min-height:100vh;
        background:
            radial-gradient(circle at 10% 0%, #dceaff 0%, transparent 45%),
            radial-gradient(circle at 90% 100%, #e2fbee 0%, transparent 45%),
            var(--bg);
        font-family:'Nunito', sans-serif;
        color:var(--ink);
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:28px 14px;
    }
    .app{
        width:100%;
        max-width:440px;
    }
    .header{
        text-align:center;
        margin-bottom:16px;
    }
    .header h1{
        font-family:'Baloo 2', sans-serif;
        font-size:26px;
        font-weight:800;
        margin:0 0 4px;
        color:#1e3a8a;
    }
    .header p{
        margin:0;
        font-size:13.5px;
        color:var(--ink-soft);
        line-height:1.5;
        padding:0 8px;
    }

    .card{
        background:var(--card);
        border-radius:var(--radius);
        border:1px solid var(--line);
        box-shadow:0 10px 30px -14px rgba(30,58,138,.15);
        padding:18px;
        margin-bottom:14px;
    }

    .search-row{
        display:flex;
        gap:8px;
    }
    .search-wrap{
        flex:1;
        display:flex;
        align-items:center;
        gap:8px;
        background:#f4f7ff;
        border:2px solid var(--line);
        border-radius:14px;
        padding:0 14px;
        transition:border-color .15s;
    }
    .search-wrap:focus-within{ border-color:var(--blue); }
    .search-wrap span{ font-size:18px; }
    #sym{
        flex:1;
        background:transparent;
        border:none;
        outline:none;
        font-family:'Nunito', sans-serif;
        font-size:16px;
        font-weight:700;
        color:var(--ink);
        padding:13px 0;
        text-transform:uppercase;
    }
    #sym::placeholder{ color:#b3bad6; text-transform:none; font-weight:600;}
    #btn{
        padding:0 20px;
        background:var(--blue);
        color:#fff;
        border:none;
        border-radius:14px;
        font-family:'Baloo 2', sans-serif;
        font-size:14px;
        font-weight:700;
        cursor:pointer;
        transition:transform .12s, background .12s;
    }
    #btn:hover{ background:#2563eb; }
    #btn:active{ transform:scale(.95); }

    .status-line{
        display:flex;
        align-items:center;
        gap:6px;
        margin-top:10px;
        font-size:12px;
        font-weight:700;
        color:var(--ink-soft);
    }
    .status-dot{ width:8px; height:8px; border-radius:50%; background:#cbd2e8; }
    .status-dot.on{ background:var(--green); box-shadow:0 0 0 4px var(--green-soft); }
    .status-dot.err{ background:var(--red); box-shadow:0 0 0 4px var(--red-soft); }

    #out{ display:none; }
    #out.show{ display:block; }

    .big-banner{
        text-align:center;
        border-radius:var(--radius);
        padding:20px;
        margin-bottom:14px;
        transition:background .4s, box-shadow .4s;
        background:var(--blue-soft);
    }
    .big-banner.peligro{ background:var(--red-soft); animation:bannerPulse 1.1s ease-in-out infinite; }
    @keyframes bannerPulse{
        0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); }
        50%{ box-shadow:0 0 0 10px rgba(239,68,68,.12); }
    }
    .big-banner .emoji{ font-size:34px; display:block; margin-bottom:4px; }
    .big-banner .msg{
        font-family:'Baloo 2', sans-serif;
        font-size:16px;
        font-weight:700;
        color:#1e3a8a;
    }
    .big-banner.peligro .msg{ color:#991b1b; }

    .price-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:6px;
    }
    .price-label{ font-size:12px; font-weight:700; color:var(--ink-soft); }
    .pair-chip{
        font-size:11px;
        font-weight:700;
        color:var(--blue);
        background:var(--blue-soft);
        padding:3px 9px;
        border-radius:20px;
    }
    .price-value{
        font-family:'Baloo 2', sans-serif;
        font-size:30px;
        font-weight:800;
        color:var(--ink);
    }

    .explain{
        font-size:12.5px;
        color:var(--ink-soft);
        line-height:1.5;
        margin-top:8px;
        background:#f7f9ff;
        border-radius:12px;
        padding:10px 12px;
    }

    .chart-wrap{ margin:18px 0 4px; }
    .wallbar{ display:flex; align-items:flex-end; gap:3px; height:64px; }
    .wcol{ flex:1; background:#dbe4fb; border-radius:3px 3px 0 0; min-height:2px; transition:height .4s; }
    .wcol.top{ background:var(--red); box-shadow:0 0 10px rgba(239,68,68,.4); }
    .axis{ display:flex; justify-content:space-between; margin-top:6px; font-size:10px; color:var(--ink-soft); font-weight:700;}

    .metric-title{
        display:flex;
        align-items:center;
        gap:8px;
        margin-bottom:8px;
    }
    .metric-title .icon{ font-size:20px; }
    .metric-title .name{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:14.5px; }

    .pill{
        display:inline-flex;
        align-items:center;
        gap:6px;
        padding:8px 14px;
        border-radius:14px;
        font-weight:800;
        font-size:14px;
        font-family:'Baloo 2', sans-serif;
    }
    .pill.blue{ background:var(--blue-soft); color:#1e40af; }
    .pill.green{ background:var(--green-soft); color:#166534; }
    .pill.yellow{ background:var(--yellow-soft); color:#92400e; }
    .pill.red{ background:var(--red-soft); color:#991b1b; }
    .pill.purple{ background:var(--purple-soft); color:#5b21b6; }
    .pill.gray{ background:#eef1f8; color:var(--ink-soft); }

    .bar-wrap{
        height:12px;
        background:#eef1f8;
        border-radius:8px;
        overflow:hidden;
        margin-top:10px;
    }
    .bar-fill{
        height:100%;
        border-radius:8px;
        width:0%;
        transition:width .4s ease, background .4s ease;
    }

    .sub{ font-size:12px; color:var(--ink-soft); margin-top:8px; line-height:1.5; }

    .err-box{
        background:var(--red-soft);
        color:#991b1b;
        border-radius:14px;
        padding:12px 14px;
        font-size:13px;
        font-weight:700;
    }

    .footer-note{
        text-align:center;
        font-size:11px;
        color:var(--ink-soft);
        margin-top:6px;
        line-height:1.5;
    }
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🐋 Cazador de Ballenas</h1>
        <p>Escribe el nombre de una cripto (por ejemplo <b>BTC</b> o <b>SOL</b>) y te explico, en fácil, qué están haciendo los "peces grandes" con su precio.</p>
    </div>

    <div class="card">
        <div class="search-row">
            <div class="search-wrap">
                <span>🔎</span>
                <input id="sym" placeholder="Ej: BTC" autocomplete="off">
            </div>
            <button id="btn">Buscar</button>
        </div>
        <div class="status-line">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Esperando que busques algo…</span>
        </div>
    </div>

    <div id="out"></div>
</div>

<script>
let wallWatch = null;
let pollTimer = null;
const POLL_MS = 5000;
const TENSION_THRESHOLD_PCT = 0.1;
const RNG_PCT = 0.15;
const UMBRAL_PENDIENTE_CRITICO_PCT = 0.15;
const UMBRAL_FALLBACK_MULTIPLIER = 3;
const CACHE_TTL_MS = 60 * 60 * 1000;
const CONFIG_UMBRALES = { BTC: 3_000_000_000_000, ETH: 1_000_000_000_000, SOL: 500_000_000_000, BNB: 300_000_000_000 };

const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

function fmtPrice(p){
    if(p >= 100) return p.toFixed(2);
    if(p >= 1) return p.toFixed(4);
    return p.toPrecision(4);
}
function formatCompact(n){
    if(n === null || n === undefined || isNaN(n)) return '—';
    const abs = Math.abs(n);
    if(abs >= 1e12) return (n/1e12).toFixed(2)+' billones';
    if(abs >= 1e9) return (n/1e9).toFixed(2)+' mil millones';
    if(abs >= 1e6) return (n/1e6).toFixed(2)+' millones';
    if(abs >= 1e3) return (n/1e3).toFixed(2)+'K';
    return n.toFixed(2);
}

// caché simple en memoria (no usamos localStorage aquí)
const memCache = {};
function getCachedTokenData(symbol){
    const d = memCache[symbol];
    if(!d) return null;
    if(Date.now() - d.ts > CACHE_TTL_MS) return null;
    return d;
}
function setCachedTokenData(symbol, data){
    memCache[symbol] = { ...data, ts: Date.now() };
}

async function fetchCoinGeckoData(symbol){
    const cached = getCachedTokenData(symbol);
    if(cached) return cached;
    const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(symbol)}`).then(r=>r.json());
    const coins = searchRes.coins || [];
    const match = coins.find(c => (c.symbol||'').toUpperCase() === symbol) || coins[0];
    if(!match) throw new Error(`No encontré esa moneda`);
    const coinData = await fetch(`https://api.coingecko.com/api/v3/coins/${match.id}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false`).then(r=>r.json());
    const supply = coinData.market_data?.circulating_supply || 0;
    const fdv = coinData.market_data?.fully_diluted_valuation?.usd || null;
    if(!supply) throw new Error(`Faltan datos de esta moneda`);
    const data = { id: match.id, supply, fdv };
    setCachedTokenData(symbol, data);
    return data;
}

function computeMarketCap(symbol, price, tokenData){
    const marketCap = price * tokenData.supply;
    const umbral = CONFIG_UMBRALES[symbol] || tokenData.fdv || (marketCap * UMBRAL_FALLBACK_MULTIPLIER);
    const ratioBurbuja = marketCap / umbral;
    return { marketCap, umbral, ratioBurbuja };
}

async function fetchShockEnergy(pair){
    const klines = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${pair}&interval=1m&limit=6`).then(r=>r.json());
    if(!Array.isArray(klines) || klines.length < 6) throw new Error('No hay suficientes datos de precio reciente.');
    const volumenesPrevios = klines.slice(0,5).map(k => +k[5]);
    const volumenPromedio5m = volumenesPrevios.reduce((a,b)=>a+b,0) / volumenesPrevios.length;
    const volumenActual = +klines[5][5];
    const precioHace5min = +klines[0][4];
    const precioActual = +klines[5][4];
    const variacionPrecio5m = ((precioActual - precioHace5min) / precioHace5min) * 100;
    const pendiente = (precioActual - precioHace5min) / 5;
    let estado = 'neutro';
    if(volumenActual > volumenPromedio5m*1.5 && Math.abs(variacionPrecio5m) < 0.2) estado = 'carga';
    else if(variacionPrecio5m > 0.5 && volumenActual < volumenPromedio5m*0.8) estado = 'debilidad';
    else if(volumenActual > volumenPromedio5m*2 && variacionPrecio5m > 1) estado = 'ruptura';
    return { volumenPromedio5m, volumenActual, variacionPrecio5m, pendiente, estado, precioActual };
}

async function updateRiskModules(symbol, pair, price){
    const banner = document.getElementById('banner');
    const mcapPill = document.getElementById('mcapPill');
    const mcapBar = document.getElementById('mcapBar');
    const mcapSub = document.getElementById('mcapSub');
    const energyPill = document.getElementById('energyPill');
    const energyBar = document.getElementById('energyBar');
    const energySub = document.getElementById('energySub');

    try{
        const tokenData = await fetchCoinGeckoData(symbol);
        const { marketCap, umbral, ratioBurbuja } = computeMarketCap(symbol, price, tokenData);
        let cls = 'green', txt = `😌 Precio con espacio para crecer (${ratioBurbuja.toFixed(2)}x)`;
        if(ratioBurbuja > 1){ cls='red'; txt = `🚨 Se ve carísimo para lo que vale de verdad (${ratioBurbuja.toFixed(2)}x)`; }
        else if(ratioBurbuja > 0.6){ cls='yellow'; txt = `😐 Empezando a verse caro (${ratioBurbuja.toFixed(2)}x)`; }
        mcapPill.className = `pill ${cls}`;
        mcapPill.textContent = txt;
        mcapBar.className = `bar-fill`;
        mcapBar.style.background = cls==='red'?'var(--red)':cls==='yellow'?'var(--yellow)':'var(--green)';
        mcapBar.style.width = `${Math.max(Math.min(ratioBurbuja*100,100),4)}%`;
        mcapSub.textContent = `Vale en total ${formatCompact(marketCap)} de dólares. Nuestro techo de referencia es ${formatCompact(umbral)}.`;
        banner.classList.toggle('peligro', ratioBurbuja > 1.0);
    }catch(err){
        mcapPill.className = 'pill gray';
        mcapPill.textContent = '😕 No pude calcular esto';
        mcapBar.style.width = '0%';
        mcapSub.textContent = `Motivo: ${err.message}`;
    }

    try{
        const shock = await fetchShockEnergy(pair);
        const { volumenPromedio5m, volumenActual, estado, pendiente, precioActual } = shock;
        const map = {
            carga:     { cls:'blue',   txt:'🔵 Una ballena está comprando en silencio', sub:'Se mueve mucho dinero pero el precio casi no cambia: alguien grande está acumulando sin llamar la atención.', pct: Math.min((volumenActual/Math.max(volumenPromedio5m,1e-9))*40,100) },
            debilidad: { cls:'yellow', txt:'🟡 Subida sospechosa, sin fuerza real', sub:'El precio sube pero casi nadie está comprando de verdad. Podría bajar pronto.', pct: 45 },
            ruptura:   { cls:'red',    txt:'🔴 ¡Rompió la pared!', sub:'Mucho dinero entró de golpe y el precio salió disparado. Algo grande acaba de pasar.', pct: 100 },
            neutro:    { cls:'gray',  txt:'⚪ Todo tranquilo por ahora', sub:'No hay señales fuertes en este momento.', pct: Math.min((volumenActual/Math.max(volumenPromedio5m,1e-9))*30,60) }
        };
        const cfg = map[estado];
        energyPill.className = `pill ${cfg.cls}`;
        energyPill.textContent = cfg.txt;
        energyBar.style.background = cfg.cls==='blue'?'var(--blue)':cfg.cls==='yellow'?'var(--yellow)':cfg.cls==='red'?'var(--red)':'#cbd2e8';
        energyBar.style.width = `${Math.max(cfg.pct,4)}%`;
        energySub.textContent = cfg.sub;

        const umbralPendiente = precioActual * (UMBRAL_PENDIENTE_CRITICO_PCT/100);
        const esVertical = Math.abs(pendiente) > umbralPendiente;
        banner.classList.toggle('peligro', banner.classList.contains('peligro') || esVertical);
    }catch(err){
        energyPill.className = 'pill gray';
        energyPill.textContent = '😕 No pude calcular esto';
        energyBar.style.width = '0%';
        energySub.textContent = `Motivo: ${err.message}`;
    }
}

function classifyWallState(consumptionPct, cvdDelta){
    if(consumptionPct > 15 && cvdDelta > 0) return { txt:'🟠 ¡La están comiendo de verdad!', cls:'yellow', sub:'Hay compras fuertes justo en esta zona: la pared se está gastando en serio.' };
    if(consumptionPct > 15 && cvdDelta <= 0) return { txt:'🫥 Falsa alarma: retiraron la orden', cls:'gray', sub:'La pared se achicó, pero no fue porque alguien compró: probablemente la cancelaron.' };
    if(consumptionPct < -5) return { txt:'💪 La pared se está reforzando', cls:'green', sub:'Están poniendo aún más órdenes de venta aquí: se hace más difícil de romper.' };
    return { txt:'😴 Sin cambios importantes', cls:'gray', sub:'La pared sigue prácticamente igual.' };
}

async function pollPreRuptura(pair){
    if(!wallWatch) return;
    const consumoPill = document.getElementById('consumoPill');
    const consumoBar = document.getElementById('consumoBar');
    const consumoSub = document.getElementById('consumoSub');
    const tensionPill = document.getElementById('tensionPill');
    const banner = document.getElementById('banner');
    if(!consumoPill || !tensionPill) return;

    try{
        const now = Date.now();
        const [dep, bt] = await Promise.all([
            fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${pair}&limit=1000`).then(r=>r.json()),
            fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${pair}`).then(r=>r.json())
        ]);
        const currentPrice = +bt.price;
        const asksInBucket = dep.asks.map(a => ({ p:+a[0], u:+a[0]*+a[1] })).filter(a => a.p >= wallWatch.priceLow && a.p < wallWatch.priceHigh);
        const currUsd = asksInBucket.reduce((s,a) => s+a.u, 0);
        const prevUsd = wallWatch.lastUsd;
        const consumptionPct = prevUsd > 0 ? ((prevUsd - currUsd) / prevUsd) * 100 : 0;

        let buyVol = 0, sellVol = 0;
        try{
            const trades = await fetch(`https://fapi.binance.com/fapi/v1/aggTrades?symbol=${pair}&startTime=${wallWatch.lastTradeTime}&endTime=${now}&limit=1000`).then(r=>r.json());
            if(Array.isArray(trades)){
                trades.forEach(t => {
                    const p = +t.p, q = +t.p * +t.q;
                    if(p >= wallWatch.priceLow && p < wallWatch.priceHigh){
                        if(t.m === false) buyVol += q; else sellVol += q;
                    }
                });
            }
        }catch(e){}

        const cvdDelta = buyVol - sellVol;
        const stateInfo = classifyWallState(consumptionPct, cvdDelta);
        consumoPill.className = `pill ${stateInfo.cls}`;
        consumoPill.textContent = stateInfo.txt;
        consumoBar.style.background = stateInfo.cls==='yellow'?'var(--yellow)':stateInfo.cls==='green'?'var(--green)':'#cbd2e8';
        consumoBar.style.width = `${Math.max(Math.min(Math.abs(consumptionPct)*4,100),4)}%`;
        consumoSub.textContent = `${stateInfo.sub} (revisamos cada ${POLL_MS/1000} segundos)`;

        const distPct = ((wallWatch.priceLow - currentPrice) / currentPrice) * 100;
        const enTension = distPct >= 0 && distPct < TENSION_THRESHOLD_PCT;
        tensionPill.className = `pill ${enTension ? 'red' : distPct < 0 ? 'purple' : 'blue'}`;
        tensionPill.textContent = enTension ? `⚠️ ¡Está a solo ${distPct.toFixed(3)}%! Puede romper en cualquier momento` : distPct < 0 ? `🎉 ¡Ya la superó!` : `📏 Falta un ${distPct.toFixed(2)}% para llegar a la pared`;
        banner.classList.toggle('peligro', banner.classList.contains('peligro') || enTension);

        wallWatch.lastUsd = currUsd;
        wallWatch.lastTradeTime = now;
    }catch(err){
        if(consumoSub) consumoSub.textContent = `😕 No pude revisar esto ahora mismo.`;
    }
}

async function run(){
    const raw = document.getElementById('sym').value.trim().toUpperCase();
    if(!raw) return;
    const pair = raw+'USDT';
    const out = document.getElementById('out');

    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    wallWatch = null;

    statusDot.className = 'status-dot';
    statusText.textContent = 'Buscando…';
    out.className = '';

    try{
        const [tk, dep] = await Promise.all([
            fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${pair}`).then(r=>r.json()),
            fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${pair}&limit=1000`).then(r=>r.json())
        ]);
        if(!tk.lastPrice) throw new Error(`No encontré "${raw}". Prueba con otro nombre, como BTC o ETH.`);

        const price = +tk.lastPrice;
        const asks = dep.asks.map(a=>({p:+a[0], u:+a[0]*+a[1]})).filter(a=>a.p > price && a.p <= price*(1+RNG_PCT));
        const bucketSize = (price * RNG_PCT) / 20;
        const walls = Array.from({length: 20}, (_, i) => ({
            price: price + (i * bucketSize),
            usd: asks.filter(a => a.p >= price + (i*bucketSize) && a.p < price + ((i+1)*bucketSize)).reduce((s,a) => s+a.u, 0)
        }));
        const maxUsd = Math.max(...walls.map(w => w.usd), 1);
        const top = [...walls].sort((a,b) => b.usd - a.usd)[0];
        const topIndex = walls.indexOf(top);

        wallWatch = {
            priceLow: price + (topIndex * bucketSize),
            priceHigh: price + ((topIndex + 1) * bucketSize),
            lastUsd: top.usd,
            lastTradeTime: Date.now()
        };

        out.innerHTML = `
            <div class="big-banner" id="banner">
                <span class="emoji">🐋</span>
                <span class="msg">Analizando ${raw} en vivo…</span>
            </div>

            <div class="card">
                <div class="price-row">
                    <span class="price-label">PRECIO ACTUAL</span>
                    <span class="pair-chip">${pair}</span>
                </div>
                <div class="price-value">$${fmtPrice(price)}</div>
                <div class="explain">Encontré una "pared" grande de gente que quiere vender en <b>$${fmtPrice(top.price)}</b>. Para seguir subiendo, el precio tiene que atravesar esa pared.</div>
                <div class="chart-wrap">
                    <div class="wallbar">${walls.map((w,i) => `<div class="wcol ${i===topIndex?'top':''}" style="height:${Math.max((w.usd/maxUsd)*64,2)}px"></div>`).join('')}</div>
                    <div class="axis"><span>$${fmtPrice(price)}</span><span>$${fmtPrice(price*(1+RNG_PCT))}</span></div>
                </div>
            </div>

            <div class="card" id="mcapRow">
                <div class="metric-title"><span class="icon">📏</span><span class="name">¿Está muy caro?</span></div>
                <span class="pill gray" id="mcapPill">Calculando…</span>
                <div class="bar-wrap"><div class="bar-fill" id="mcapBar"></div></div>
                <div class="sub" id="mcapSub">Comparando el valor total de la moneda contra un techo de referencia.</div>
            </div>

            <div class="card" id="energyRow">
                <div class="metric-title"><span class="icon">⚡</span><span class="name">¿Qué está haciendo la ballena?</span></div>
                <span class="pill gray" id="energyPill">Calculando…</span>
                <div class="bar-wrap"><div class="bar-fill" id="energyBar"></div></div>
                <div class="sub" id="energySub"></div>
            </div>

            <div class="card" id="consumoRow">
                <div class="metric-title"><span class="icon">🧱</span><span class="name">¿Está desapareciendo la pared?</span></div>
                <span class="pill gray" id="consumoPill">Esperando primer chequeo…</span>
                <div class="bar-wrap"><div class="bar-fill" id="consumoBar"></div></div>
                <div class="sub" id="consumoSub"></div>
            </div>

            <div class="card" id="tensionRow">
                <div class="metric-title"><span class="icon">📐</span><span class="name">¿Qué tan cerca estamos?</span></div>
                <span class="pill blue" id="tensionPill">Calculando…</span>
            </div>

            <div class="footer-note">Esto no es un consejo para invertir, solo un juego para entender mejor lo que pasa en el mercado. 🙂</div>
        `;
        out.classList.add('show');
        statusDot.className = 'status-dot on';
        statusText.textContent = `Mostrando ${raw} en vivo`;

        updateRiskModules(raw, pair, price);
        pollTimer = setInterval(() => pollPreRuptura(pair), POLL_MS);
        pollPreRuptura(pair);
    }catch(err){
        out.innerHTML = `<div class="card"><div class="err-box">⚠ ${err.message || 'No pude conectar con Binance. Revisa el nombre de la moneda.'}</div></div>`;
        out.classList.add('show');
        statusDot.className = 'status-dot err';
        statusText.textContent = 'Ups, algo salió mal';
        if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
        wallWatch = null;
    }
}

document.getElementById('btn').onclick = run;
document.getElementById('sym').addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
</script>
</body>
</html>
