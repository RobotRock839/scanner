<script>
'use strict';

const LOCK_MINUTES = 15;
const memory = {};
let autoT = null, lockTimer = null;

function fmtP(p){
  if(!p||isNaN(p)) return '—';
  if(p>=1000) return p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)    return p.toFixed(4);
  if(p>=0.01) return p.toFixed(5);
  return p.toFixed(6);
}
function fmtBig(n){
  if(!n||isNaN(n)) return '—';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function levelNum(cls){
  return cls==='v-red'?4:cls==='v-yellow'?3:cls==='v-orange'?2:cls==='v-green'?1:0;
}

function tick(){ document.getElementById('ts').textContent = new Date().toLocaleTimeString('es-AR'); }
setInterval(tick,1000); tick();

function updateLockDisplay(token){
  const m = memory[token];
  const el = document.getElementById('lock-display');
  if(!m||levelNum(m.vCls)<3){ el.innerHTML=''; return; }
  const elapsed = (Date.now()-m.ts)/1000;
  const remaining = Math.max(0, LOCK_MINUTES*60 - elapsed);
  if(remaining<=0){ el.innerHTML=''; return; }
  const min=Math.floor(remaining/60), sec=Math.floor(remaining%60);
  const isRed=m.vCls==='v-red';
  el.innerHTML=`<div class="lock-bar ${isRed?'':'amarillo'}">
    <span class="lock-icon">${isRed?'🔒':'⚠️'}</span>
    <span>SEÑAL BLOQUEADA — ${m.vTxt}</span>
    <span class="countdown">${min}:${sec.toString().padStart(2,'0')}</span>
  </div>`;
}

document.getElementById('sym').addEventListener('keydown', e=>{ if(e.key==='Enter') run(); });
document.getElementById('auto').addEventListener('change', function(){
  clearInterval(autoT); autoT=null;
  const v=parseInt(this.value);
  if(v>0) autoT=setInterval(run,v*1000);
});

/* ══ ADX DE WILDER — v6.2 ══
   Calcula ADX/+DI/-DI desde klines de Binance.
   ADX>25 = tendencia, >50 = fuerte, >75 = clímax absoluto.
   Necesita al menos period*2+1 velas para ser preciso.
*/
function calcADX(klines, period=14){
  if(!klines || klines.length < period*2+1) return {adx:0, diPlus:0, diMinus:0};
  const highs  = klines.map(k=>parseFloat(k[2]));
  const lows   = klines.map(k=>parseFloat(k[3]));
  const closes = klines.map(k=>parseFloat(k[4]));

  const trArr=[], dmpArr=[], dmmArr=[];
  for(let i=1;i<klines.length;i++){
    const h=highs[i],l=lows[i],pc=closes[i-1];
    const tr=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    const up=h-highs[i-1], dn=lows[i-1]-l;
    trArr.push(tr);
    dmpArr.push(up>dn&&up>0?up:0);
    dmmArr.push(dn>up&&dn>0?dn:0);
  }

  // Wilder smoothing inicial
  function wilderSmooth(arr,p){
    const res=[arr.slice(0,p).reduce((a,b)=>a+b,0)];
    for(let i=p;i<arr.length;i++) res.push(res[res.length-1]-res[res.length-1]/p+arr[i]);
    return res;
  }

  const atr14=wilderSmooth(trArr,period);
  const dmp14=wilderSmooth(dmpArr,period);
  const dmm14=wilderSmooth(dmmArr,period);

  const dxArr=[];
  for(let i=0;i<atr14.length;i++){
    if(atr14[i]===0){dxArr.push(0);continue;}
    const pdi=(dmp14[i]/atr14[i])*100;
    const mdi=(dmm14[i]/atr14[i])*100;
    const dx=(pdi+mdi)>0?Math.abs(pdi-mdi)/(pdi+mdi)*100:0;
    dxArr.push(dx);
  }

  let adx=dxArr.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<dxArr.length;i++) adx=(adx*(period-1)+dxArr[i])/period;

  const lastI=atr14.length-1;
  const pdi=atr14[lastI]>0?(dmp14[lastI]/atr14[lastI])*100:0;
  const mdi=atr14[lastI]>0?(dmm14[lastI]/atr14[lastI])*100:0;

  return {adx:Math.round(adx*10)/10, diPlus:Math.round(pdi*10)/10, diMinus:Math.round(mdi*10)/10};
}

function parseCVD(klines){
  return klines.map(k=>{
    const o=parseFloat(k[1]),h=parseFloat(k[2]),l=parseFloat(k[3]),c=parseFloat(k[4]),v=parseFloat(k[5]);
    const range=h-l;
    const presion=range>0?((c-l)-(h-c))/range:(c>=o?1:-1);
    return {cvd:presion*v,vol:v,close:c,high:h,low:l,open:o};
  });
}

async function fetchLiquidez(pair, price, high24){
  const base = 'https://fapi.binance.com/futures/data/';
  const base1 = 'https://fapi.binance.com/fapi/v1/';

  const [forceR, lsRatioR, takerR, oiHistR, topLSR] = await Promise.allSettled([
    fetch(base1+'allForceOrders?symbol='+pair+'&limit=100').then(r=>r.json()),
    fetch(base+'globalLongShortAccountRatio?symbol='+pair+'&period=5m&limit=6').then(r=>r.json()),
    fetch(base+'takerlongshortRatio?symbol='+pair+'&period=5m&limit=6').then(r=>r.json()),
    fetch(base+'openInterestHist?symbol='+pair+'&period=5m&limit=12').then(r=>r.json()),
    fetch(base+'topLongShortPositionRatio?symbol='+pair+'&period=5m&limit=6').then(r=>r.json()),
  ]);

  const forceOrders = forceR.status==='fulfilled' && Array.isArray(forceR.value) ? forceR.value : [];
  let liqShortUSD=0, liqLongUSD=0, liqShortCount=0, liqLongCount=0;
  let liqZonas = {};

  forceOrders.forEach(o => {
    const qty = parseFloat(o.origQty) * parseFloat(o.price);
    const bucket = (Math.round(parseFloat(o.price) / (price*0.005)) * (price*0.005)).toFixed(6);
    if(!liqZonas[bucket]) liqZonas[bucket] = {long:0, short:0};
    if(o.side === 'BUY'){
      liqShortUSD += qty; liqShortCount++;
      liqZonas[bucket].short += qty;
    } else {
      liqLongUSD += qty; liqLongCount++;
      liqZonas[bucket].long += qty;
    }
  });

  const totalLiqUSD = liqShortUSD + liqLongUSD;
  const pctShortLiq = totalLiqUSD > 0 ? (liqShortUSD/totalLiqUSD)*100 : 50;

  const zonasArr = Object.entries(liqZonas)
    .map(([p,v]) => ({price:parseFloat(p), total:v.long+v.short, long:v.long, short:v.short}))
    .sort((a,b) => b.total-a.total)
    .slice(0, 15);

  const lsData = lsRatioR.status==='fulfilled' && Array.isArray(lsRatioR.value) ? lsRatioR.value : [];
  const lsActual = lsData.length > 0 ? parseFloat(lsData[lsData.length-1].longShortRatio) : 1;
  const lsAnterior = lsData.length > 1 ? parseFloat(lsData[0].longShortRatio) : lsActual;
  const lsCreciendo = lsActual > lsAnterior * 1.05;
  const lsCayendo   = lsActual < lsAnterior * 0.95;
  const pctLong = lsData.length > 0 ? parseFloat(lsData[lsData.length-1].longAccount)*100 : 50;

  const takerData = takerR.status==='fulfilled' && Array.isArray(takerR.value) ? takerR.value : [];
  const takerActual = takerData.length > 0 ? parseFloat(takerData[takerData.length-1].buySellRatio) : 1;
  const takerAnterior = takerData.length > 1 ? parseFloat(takerData[0].buySellRatio) : takerActual;
  const takerBullish  = takerActual > 1.1;
  const takerBearish  = takerActual < 0.9;
  const takerCayendo  = takerActual < takerAnterior * 0.85;

  const oiHist = oiHistR.status==='fulfilled' && Array.isArray(oiHistR.value) ? oiHistR.value : [];
  let oiDelta = 0, oiTendencia = 'neutral';
  if(oiHist.length >= 3){
    const oiFirst = parseFloat(oiHist[0].sumOpenInterest);
    const oiLast  = parseFloat(oiHist[oiHist.length-1].sumOpenInterest);
    oiDelta = ((oiLast - oiFirst) / oiFirst) * 100;
    oiTendencia = oiDelta > 2 ? 'subiendo' : oiDelta < -2 ? 'bajando' : 'estable';
  }
  const oiDistribucion = oiTendencia === 'bajando';

  const topLS = topLSR.status==='fulfilled' && Array.isArray(topLSR.value) ? topLSR.value : [];
  const topRatio = topLS.length > 0 ? parseFloat(topLS[topLS.length-1].longShortRatio) : 1;
  const topShortBias = topRatio < 0.8;

  let ballenaEstado, ballenaClase, ballenaIcon, ballenaTxt;
  const squeezeFuel      = pctShortLiq > 65 && !oiDistribucion;
  const distribucion     = oiDistribucion && (takerBearish || takerCayendo);
  const liqLongDominante = pctShortLiq < 35;

  // ── Absorción CVD: takers cayendo + vol bajo + OI aún estable
  // El LIQSCAN lo detecta como "Vol Whale 0.4x — ABSORCIÓN"
  // = la ballena absorbió el movimiento y ahora vende silenciosamente
  const absorcionCVD = takerCayendo && !oiDistribucion && takerActual < 1.0;

  // ── Retail atrapado: funding positivo moderado + takers vendiendo
  // = compradores retail pagando funding, ballena ya no empuja
  const retailAtrapado = takerBearish && !oiDistribucion && !squeezeFuel;

  // ── Agotamiento sin distribución confirmada: OI estable pero takers caen
  const agotamiento = takerCayendo && oiTendencia === 'estable' && pctShortLiq < 65;

  if(liqLongDominante && oiDistribucion){
    ballenaEstado = 'PANZA LLENA — DISTRIBUYENDO';
    ballenaClase  = 'b-llena';
    ballenaIcon   = '🐋💨';
    ballenaTxt    = `Liq LONG dominan (${(100-pctShortLiq).toFixed(0)}%). OI cae. La ballena ya vendió.`;
  } else if(distribucion && !squeezeFuel){
    ballenaEstado = 'POSIBLE TECHO — OI CAYENDO';
    ballenaClase  = 'b-llenando';
    ballenaIcon   = '🐋⚠️';
    ballenaTxt    = `OI ${oiDelta.toFixed(1)}% con precio subiendo. Takers ${takerActual.toFixed(2)}x. Distribución activa.`;
  } else if(squeezeFuel){
    ballenaEstado = 'CAZANDO SHORTS — SIGUE';
    ballenaClase  = 'b-buscando';
    ballenaIcon   = '🐋🎣';
    ballenaTxt    = `${pctShortLiq.toFixed(0)}% liquidaciones son SHORTS. OI estable. La ballena sigue apretando.`;
  } else if(absorcionCVD){
    // ← NUEVO: lo que el LIQSCAN llama "Absorción CVD confirmada"
    ballenaEstado = 'ABSORCIÓN CVD — SALIENDO';
    ballenaClase  = 'b-llenando';
    ballenaIcon   = '🐋📤';
    ballenaTxt    = `Takers cayendo (${takerActual.toFixed(2)}x). Vol bajo. La ballena absorbió y vende silencioso.`;
  } else if(retailAtrapado){
    // ← NUEVO: lo que el LIQSCAN llama "Retail atrapado arriba"
    ballenaEstado = 'RETAIL ATRAPADO — VIGILAR';
    ballenaClase  = 'b-llenando';
    ballenaIcon   = '🐋👀';
    ballenaTxt    = `Takers vendedores (${takerActual.toFixed(2)}x). Funding positivo. Retail paga, ballena observa.`;
  } else if(agotamiento){
    // ← NUEVO: agotamiento sin confirmación total
    ballenaEstado = 'AGOTAMIENTO DETECTADO';
    ballenaClase  = 'b-llenando';
    ballenaIcon   = '🐋⏳';
    ballenaTxt    = `Takers perdiendo fuerza. OI estable. Liq shorts ${pctShortLiq.toFixed(0)}%. Esperar confirmación.`;
  } else {
    ballenaEstado = 'SIN SEÑAL CLARA';
    ballenaClase  = 'b-unknown';
    ballenaIcon   = '🐋❓';
    ballenaTxt    = `Liq shorts ${pctShortLiq.toFixed(0)}% · OI ${oiDelta.toFixed(1)}% · Takers ${takerActual.toFixed(2)}x`;
  }

  return {
    liqShortUSD, liqLongUSD, liqShortCount, liqLongCount,
    pctShortLiq, totalLiqUSD, zonasArr,
    pctLong, lsActual, lsCreciendo, lsCayendo,
    takerActual, takerBullish, takerBearish, takerCayendo,
    oiDelta, oiTendencia, oiDistribucion,
    topRatio, topShortBias,
    ballenaEstado, ballenaClase, ballenaIcon, ballenaTxt,
    squeezeFuel, distribucion, liqLongDominante,
    absorcionCVD, retailAtrapado, agotamiento
  };
}

/* ══════════════════════════════════════════════
   FIX v6.1: calcLimit con lógica de libro corregida
   - RNG ampliado a ±8% para capturar paredes reales
   - liquidezLibre = bids / (bids+asks) en zona cercana
   ══════════════════════════════════════════════ */
function calcLimit(price, asks, bids, high24, minLocal, oi, vol24, kl1h, liqData){
  // FIX: rango ampliado de 2.5% a 8% para capturar paredes
  const RNG_RESIST = price * 0.08;
  const asksNear = asks.filter(a => a.price <= price + RNG_RESIST && a.price > price);

  let resistLevel = price * 1.02;
  if(asksNear.length > 0){
    const bucketSize = price * 0.005;
    const buckets = {};
    asksNear.forEach(a => {
      const b = Math.floor((a.price - price) / bucketSize);
      if(!buckets[b]) buckets[b] = {price: a.price, usd: 0};
      buckets[b].usd += a.usd;
    });
    const top = Object.values(buckets).sort((a,b)=>b.usd-a.usd)[0];
    if(top) resistLevel = top.price;
  }

  let atr = 0;
  if(kl1h && kl1h.length >= 5){
    const last5 = kl1h.slice(-5);
    atr = last5.reduce((s,k)=>s+parseFloat(k[2])-parseFloat(k[3]),0)/5;
  }
  const atrTarget = minLocal>0&&atr>0 ? minLocal+atr*2.5 : price*1.03;

  let liqTarget = high24>price ? high24*1.02 : price*1.04;
  if(liqData && liqData.zonasArr && liqData.zonasArr.length > 0){
    const zonaArriba = liqData.zonasArr
      .filter(z => z.price > price && z.short > z.long)
      .sort((a,b) => b.short-a.short)[0];
    if(zonaArriba) liqTarget = zonaArriba.price;
  }

  const limit = resistLevel*0.45 + atrTarget*0.25 + liqTarget*0.30;

  // FIX: liquidezLibre = ratio bids/(bids+asks) en zona ±3%
  // Si bids dominan → camino despejado arriba (verde)
  // Si asks dominan → libro denso, techo cercano (rojo)
  const RNG_CLOSE = price * 0.03;
  const askUSDClose = asks.filter(a => a.price <= price + RNG_CLOSE).reduce((s,a)=>s+a.usd,0);
  const bidUSDClose = bids.filter(b => b.price >= price - RNG_CLOSE).reduce((s,b)=>s+b.usd,0);
  const totalCercano = askUSDClose + bidUSDClose;

  // liquidezLibre: cuánto "espacio" hay arriba vs cuánta presión vendedora
  // 100% = solo bids (camino libre), 0% = solo asks (pared total)
  const liquidezLibre = totalCercano > 0
    ? Math.min(100, Math.max(0, (bidUSDClose / totalCercano) * 100))
    : 50;

  const distPct = ((limit-price)/price)*100;

  return {limit, resistLevel, atrTarget, liqTarget, distPct, liquidezLibre,
          askUSDClose, bidUSDClose, totalCercano};
}

/* ── RENDER DEL MAPA DE LIQUIDACIONES ── */
function renderLiqMap(zonasArr, price){
  if(!zonasArr || zonasArr.length===0) return '<div style="text-align:center;color:var(--muted);font-size:10px;padding:20px;font-family:\'IBM Plex Mono\',monospace;">Sin datos de liquidaciones recientes</div>';

  const allPrices = zonasArr.map(z=>z.price);
  const minP = Math.min(...allPrices, price*0.97);
  const maxP = Math.max(...allPrices, price*1.03);
  const range = maxP - minP || 1;
  const maxTotal = Math.max(...zonasArr.map(z=>z.total));

  const W = 280;
  let bars = '';
  zonasArr.forEach(z => {
    const x = ((z.price - minP) / range) * (W-4);
    const h = Math.max(4, (z.total / maxTotal) * 70);
    const isShort = z.short > z.long;
    const col = isShort ? 'rgba(0,201,122,.7)' : 'rgba(240,74,90,.7)';
    bars += `<div class="liqmap-bar" style="left:${x.toFixed(1)}px;height:${h}px;background:${col};"></div>`;
  });

  const priceX = ((price - minP) / range) * (W-4);
  const minLabel = fmtP(minP);
  const maxLabel = fmtP(maxP);

  return `
    <div style="position:relative;">
      <div class="liqmap" style="width:100%;">
        ${bars}
        <div class="liqmap-price" style="left:${priceX.toFixed(1)}px;"></div>
        <div class="liqmap-label" style="left:2px;">${minLabel}</div>
        <div class="liqmap-label" style="right:2px;left:auto;">${maxLabel}</div>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);display:flex;gap:14px;margin-top:5px;">
        <span style="color:var(--green);">▮ shorts liquidados (squeeze fuel)</span>
        <span style="color:var(--red);">▮ longs liquidados (techo)</span>
      </div>
    </div>`;
}

/* ── RENDER DEL LIBRO VISUAL ── */
function renderLibroVisual(asks, bids, price){
  // Tomamos 20 niveles de cada lado en ±5%
  const RNG = price * 0.05;
  const asksV = asks.filter(a=>a.price<=price+RNG && a.price>price).slice(0,20);
  const bidsV = bids.filter(b=>b.price>=price-RNG && b.price<price).slice(0,20);

  if(asksV.length===0 && bidsV.length===0){
    return '<div style="text-align:center;color:var(--muted);font-size:10px;padding:10px;font-family:\'IBM Plex Mono\',monospace;">Sin datos de libro</div>';
  }

  const maxUSD = Math.max(
    ...asksV.map(a=>a.usd),
    ...bidsV.map(b=>b.usd),
    1
  );

  // Bid bars (izquierda, verde) + ask bars (derecha, rojo), centrado en precio
  let bidBars = bidsV.slice().reverse().map(b=>{
    const h = Math.max(4, (b.usd/maxUSD)*58);
    return `<div class="libro-col" style="height:${h}px;background:rgba(0,201,122,${0.3+0.7*(b.usd/maxUSD)});"></div>`;
  }).join('');

  let askBars = asksV.map(a=>{
    const h = Math.max(4, (a.usd/maxUSD)*58);
    return `<div class="libro-col" style="height:${h}px;background:rgba(240,74,90,${0.3+0.7*(a.usd/maxUSD)});"></div>`;
  }).join('');

  const totalAsk = asksV.reduce((s,a)=>s+a.usd,0);
  const totalBid = bidsV.reduce((s,b)=>s+b.usd,0);
  const ratio = totalBid>0 ? totalAsk/totalBid : 0;

  // Pared más grande arriba
  const paredTop = asksV.reduce((mx,a)=>a.usd>mx.usd?a:mx, {usd:0,price:0});
  const soporteTop = bidsV.reduce((mx,b)=>b.usd>mx.usd?b:mx, {usd:0,price:0});

  const ratioCls = ratio>2?'var(--red)':ratio>1.3?'var(--yellow)':'var(--green)';
  const ratioTxt = ratio>2?'PARED FUERTE':ratio>1.3?'RESISTENCIA':'LIBRE';

  return `
    <div class="libro-visual">
      ${bidBars}
      <div style="width:2px;background:rgba(255,255,255,.5);height:100%;border-radius:1px;flex-shrink:0;"></div>
      ${askBars}
    </div>
    <div class="libro-precio" style="font-size:10px;display:flex;justify-content:space-between;padding:6px 10px;">
      <span style="color:var(--green);">BIDS $${fmtBig(totalBid)}</span>
      <span style="color:#fff;">${fmtP(price)}</span>
      <span style="color:var(--red);">ASKS $${fmtBig(totalAsk)}</span>
    </div>
    <div class="libro-stats">
      <div class="libro-stat">
        <div class="lsv" style="color:${ratioCls}">${ratio.toFixed(1)}x</div>
        <div class="lsl">ratio ask/bid</div>
      </div>
      <div class="libro-stat">
        <div class="lsv" style="color:var(--red);font-size:11px;">${fmtP(paredTop.price)}</div>
        <div class="lsl">pared asks $${fmtBig(paredTop.usd)}</div>
      </div>
      <div class="libro-stat">
        <div class="lsv" style="color:var(--green);font-size:11px;">${fmtP(soporteTop.price)}</div>
        <div class="lsl">soporte bids $${fmtBig(soporteTop.usd)}</div>
      </div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${ratioCls};margin-top:8px;text-align:center;font-weight:700;letter-spacing:1px;">${ratioTxt} — ±5% del precio</div>
  `;
}

async function run(){

  if(!raw) return;
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='...';

  try{
    const pair=raw+'USDT';

    try{ await fetch('https://fapi.binance.com/fapi/v1/ping'); }
    catch(e){
      document.getElementById('out').innerHTML=`<div class="err">SIN CONEXIÓN A BINANCE<br><br>Abrís desde file:// — usá python -m http.server 8080</div>`;
      btn.disabled=false; btn.textContent='ANALIZAR'; return;
    }

    const [tkR,kl1R,kl5R,kl15R,kl1hR,depR,frR,oiR] = await Promise.allSettled([
      fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbol='+pair).then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/klines?symbol='+pair+'&interval=1m&limit=40').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/klines?symbol='+pair+'&interval=5m&limit=30').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/klines?symbol='+pair+'&interval=15m&limit=20').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/klines?symbol='+pair+'&interval=1h&limit=14').then(r=>r.json()),
      // FIX: limit=1000 para capturar más profundidad del libro
      fetch('https://fapi.binance.com/fapi/v1/depth?symbol='+pair+'&limit=1000').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol='+pair+'&limit=3').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol='+pair).then(r=>r.json())
    ]);

    const tk=tkR.status==='fulfilled'?tkR.value:null;
    if(!tk||tk.code){
      document.getElementById('out').innerHTML=`<div class="err">TOKEN "${raw}" NO ENCONTRADO</div>`;
      btn.disabled=false; btn.textContent='ANALIZAR'; return;
    }

    const price   = parseFloat(tk.lastPrice);
    const ch24    = parseFloat(tk.priceChangePercent);
    const vol24   = parseFloat(tk.quoteVolume);
    const high24  = parseFloat(tk.highPrice);
    const oi      = oiR.status==='fulfilled'&&oiR.value.openInterest?parseFloat(oiR.value.openInterest)*price:0;

    const liqData = await fetchLiquidez(pair, price, high24).catch(()=>null);

    const frArr   = frR.status==='fulfilled'?frR.value:[];
    const funding = frArr.length>0?frArr.reduce((a,b)=>a+parseFloat(b.fundingRate),0)/frArr.length*100:0;
    const fundingLast=frArr.length>0?parseFloat(frArr[0].fundingRate)*100:0;
    const fundingBullSqueeze = fundingLast < -0.05;

    const v1  = parseCVD(kl1R.status==='fulfilled'?kl1R.value:[]);
    const v5  = parseCVD(kl5R.status==='fulfilled'?kl5R.value:[]);
    const v15 = parseCVD(kl15R.status==='fulfilled'?kl15R.value:[]);
    const kl1h= kl1hR.status==='fulfilled'?kl1hR.value:[];

    const cvd5Total=v5.reduce((a,b)=>a+b.cvd,0);
    const mid5=Math.floor(v5.length/2);
    const cvd5A=v5.slice(0,mid5).reduce((a,b)=>a+b.cvd,0);
    const cvd5B=v5.slice(mid5).reduce((a,b)=>a+b.cvd,0);
    const acelerando5    = cvd5B>cvd5A && cvd5B>0;
    const desacelerando5 = cvd5A>0 && cvd5B<cvd5A*0.35;

    const cvd1Total=v1.reduce((a,b)=>a+b.cvd,0);
    const cvdUSD=Math.max(0,cvd1Total*price);

    let stochK=50;
    if(kl1h.length>=14){
      const sl=kl1h.slice(-14);
      const loL=Math.min(...sl.map(k=>parseFloat(k[3])));
      const hiH=Math.max(...sl.map(k=>parseFloat(k[2])));
      const lC=parseFloat(kl1h[kl1h.length-1][4]);
      stochK=hiH>loL?((lC-loL)/(hiH-loL))*100:50;
    }
    const sobrecompra=stochK>=85, sobrecompraExtrema=stochK>=95;

    // ── ADX v6.2 — usa klines 1h (14 periodos mínimo, mejor con 30+) ──
    const adxData = calcADX(kl1h, 14);
    const adx = adxData.adx;
    const adxClimax    = adx >= 75; // clímax absoluto — igual al LIQSCAN
    const adxFuerte    = adx >= 50; // tendencia fuerte
    const adxTendencia = adx >= 25; // tendencia activa
    // +DI < -DI con ADX alto = tendencia bajista confirmada
    const adxBearish   = adxData.diMinus > adxData.diPlus && adx >= 25;

    const precioAlto=price>=high24*0.90;
    const cvd5Last4=v5.slice(-4).reduce((a,b)=>a+b.cvd,0)/4;
    const cvd5Prev=v5.slice(0,-4).reduce((a,b)=>a+b.cvd,0)/Math.max(v5.length-4,1);
    const divergencia5m=precioAlto&&cvd5Last4<cvd5Prev*0.5&&cvd5Prev>0;

    const cvd15Last3=v15.slice(-3).reduce((a,b)=>a+b.cvd,0)/3;
    const cvd15Prev=v15.slice(0,-3).reduce((a,b)=>a+b.cvd,0)/Math.max(v15.length-3,1);
    const divergencia15m=precioAlto&&cvd15Last3<cvd15Prev*0.5&&cvd15Prev>0;

    const mid1=Math.floor(v1.length/2);
    const cvd1Last6Avg=v1.slice(-6).reduce((a,b)=>a+b.cvd,0)/6;
    const cvd1PrimAvg=v1.slice(0,mid1).reduce((a,b)=>a+b.cvd,0)/Math.max(mid1,1);
    const divergencia1m=precioAlto&&cvd1Last6Avg<cvd1PrimAvg*0.5&&cvd1PrimAvg>0;
    const divgCount=[divergencia1m,divergencia5m,divergencia15m].filter(Boolean).length;

    const vol3=v1.slice(-3).reduce((a,b)=>a+b.vol,0)/3;
    const vol6=v1.slice(-9,-3).reduce((a,b)=>a+b.vol,0)/6;
    const volAvg=v1.reduce((a,b)=>a+b.vol,0)/Math.max(v1.length,1);
    const volCayendo=vol6>0&&vol3<vol6*0.6;
    const volInstitucional=vol3>volAvg*1.5;

    const dep=depR.status==='fulfilled'?depR.value:{asks:[],bids:[]};

    // FIX: rango ampliado a 8% para el análisis principal
    const RNG = price * 0.08;
    const asks=(dep.asks||[]).map(a=>({price:parseFloat(a[0]),usd:parseFloat(a[0])*parseFloat(a[1])})).filter(a=>a.price>=price);
    const bids=(dep.bids||[]).map(b=>({price:parseFloat(b[0]),usd:parseFloat(b[0])*parseFloat(b[1])})).filter(b=>b.price<=price);
    const askUSD=asks.filter(a=>a.price<=price+RNG).reduce((s,a)=>s+a.usd,0);
    const bidUSD=bids.filter(b=>b.price>=price-RNG).reduce((s,b)=>s+b.usd,0);
    const ratio=bidUSD>0?askUSD/bidUSD:99;
    const blkUSD=asks.filter(a=>a.price<=price+price*0.005).reduce((s,a)=>s+a.usd,0);
    const absorb=blkUSD>0?Math.min(100,(cvdUSD/blkUSD)*100):0;
    const sinLibro=absorb>60, paredFuerte=ratio>2.5, paredMedia=ratio>1.5;
    const topBid=bids[0];
    const ballenaSoporte=topBid&&bidUSD>0&&(topBid.usd/bidUSD)>0.25;

    const minLocal=Math.min(...v1.map(v=>v.low));
    const pumpIntraday=minLocal>0?((price-minLocal)/minLocal)*100:0;
    const pumpEfectivo=Math.max(ch24,pumpIntraday*3);

    // LIMIT — FIX: pasa bids también
    const lim=calcLimit(price, asks, bids, high24, minLocal, oi, vol24, kl1h, liqData);

    // SCORE
    const scorePump=Math.min(30,(pumpEfectivo/200)*30);
    let scoreFund=0;
    if(fundingLast>0.3) scoreFund=25;
    else if(fundingLast>0.15) scoreFund=20;
    else if(fundingLast>0.1)  scoreFund=15;
    else if(fundingLast>0.05) scoreFund=10;
    else if(fundingLast>0.01) scoreFund=5;
    else if(fundingLast<-0.05) scoreFund=-10;
    else if(fundingLast<-0.01) scoreFund=-5;

    const scoreDivg=divgCount===3?25:divgCount===2?18:divgCount===1?10:desacelerando5?5:0;
    const scoreStoch=sobrecompraExtrema?15:sobrecompra?9:0;
    const scoreVol=volCayendo?5:0;

    let scoreLiq=0;
    if(liqData){
      if(liqData.liqLongDominante && liqData.oiDistribucion) scoreLiq=15;  // techo confirmado
      else if(liqData.distribucion)   scoreLiq=12;  // OI cae + takers venden
      else if(liqData.oiDistribucion) scoreLiq=8;   // OI cae solo
      else if(liqData.absorcionCVD)   scoreLiq=8;   // ← NUEVO: absorción silenciosa
      else if(liqData.retailAtrapado) scoreLiq=6;   // ← NUEVO: retail atrapado
      else if(liqData.agotamiento)    scoreLiq=4;   // ← NUEVO: agotamiento
      else if(liqData.squeezeFuel)    scoreLiq=-8;  // squeeze activo, NO techo
    }

    // FIX v6.2: umbral funding más sensible (0.03% = retail atrapado, antes era 0.05%)
    // Ajusta scoreFund para capturar antes el calentamiento
    if(fundingLast>0.03 && fundingLast<=0.05) scoreFund = Math.max(scoreFund, 7);

    const techoScore=Math.max(0,Math.round(scorePump+scoreFund+scoreDivg+scoreStoch+scoreVol+scoreLiq));

    const [fillColor,techoText]=
      techoScore>=80?['var(--red)','ZONA DE TECHO']:
      techoScore>=55?['var(--yellow)','SPIKE MADURO']:
      techoScore>=25?['var(--green)','SPIKE EN CURSO']:
                     ['var(--muted)','INICIO'];

    const techoExtremo=fundingLast>0.3&&sinLibro&&(ch24>100||pumpIntraday>50);
    const techoMedioSinDiv=ch24>100&&fundingLast>0.15&&sinLibro&&sobrecompra;
    const cvdAunPositivo=cvd5Total>0&&!volInstitucional&&divgCount===0;
    const squeezeActivo=fundingBullSqueeze&&cvd5Total>0&&pumpIntraday<20;
    const ballenaDistrib=liqData&&(liqData.liqLongDominante||liqData.distribucion||liqData.absorcionCVD||liqData.retailAtrapado);

    const señalesTecho=[
      sinLibro&&desacelerando5,
      divergencia5m,
      divergencia15m,
      divergencia1m,
      fundingLast>0.03&&desacelerando5,         // FIX: umbral 0.03 (antes 0.05)
      volCayendo&&divgCount>0,
      techoExtremo,
      sobrecompraExtrema&&sinLibro,
      ch24>100&&fundingLast>0.15&&sobrecompra,
      liqData&&liqData.liqLongDominante&&liqData.oiDistribucion,
      liqData&&liqData.oiDistribucion&&liqData.takerBearish,
      liqData&&liqData.absorcionCVD&&divgCount>0, // ← NUEVO: absorción + divergencia
      liqData&&liqData.retailAtrapado&&sobrecompra // ← NUEVO: retail atrapado + stoch
    ].filter(Boolean).length;

    let vCls,vTxt,vIcon;
    if(techoExtremo||(ballenaDistrib&&señalesTecho>=4)||señalesTecho>=5){
      vCls='v-red'; vTxt='TECHO CONFIRMADO — ENTRADA SHORT'; vIcon='🔴';
    } else if((techoMedioSinDiv&&!techoExtremo)||señalesTecho===3||señalesTecho===4){
      if(cvdAunPositivo&&!ballenaDistrib){
        vCls='v-orange'; vTxt='ZONA DE TECHO — ESPERAR DIVERGENCIA 5M'; vIcon='🟠';
      } else {
        vCls='v-yellow'; vTxt='ZONA DE TECHO — PRECAUCIÓN'; vIcon='⚠️';
      }
    } else if(señalesTecho===2){
      vCls='v-yellow'; vTxt='SEÑALES INICIALES — VIGILAR'; vIcon='⚠️';
    } else if(squeezeActivo||(liqData&&liqData.squeezeFuel&&!ballenaDistrib)){
      vCls='v-green'; vTxt='SHORT SQUEEZE ACTIVO — NO SHORT'; vIcon='🟢';
    } else if(acelerando5&&divgCount===0){
      vCls='v-green'; vTxt='SIGUE CON FUERZA — ESPERAR'; vIcon='🟢';
    } else {
      vCls='v-gray'; vTxt='SIN SEÑAL CLARA'; vIcon='⬜';
    }

    // Memoria
    const mem=memory[raw];
    const now=Date.now();
    let locked=false;
    if(mem){
      const elapsed=(now-mem.ts)/1000;
      const lockExpired=elapsed>LOCK_MINUTES*60;
      const newSpikeUp=price>mem.maxPrice*1.02;
      if(!lockExpired&&!newSpikeUp&&levelNum(vCls)<levelNum(mem.vCls)){
        vCls=mem.vCls; vTxt=mem.vTxt; vIcon=mem.vIcon; locked=true;
      }
    }
    if(!locked||!mem||levelNum(vCls)>levelNum(mem.vCls)){
      memory[raw]={level:levelNum(vCls),vCls,vTxt,vIcon,score:techoScore,maxPrice:mem?Math.max(price,mem.maxPrice):price,ts:mem&&locked?mem.ts:now};
    } else if(mem){ memory[raw].maxPrice=Math.max(price,mem.maxPrice); }
    clearInterval(lockTimer);
    if(locked){ updateLockDisplay(raw); lockTimer=setInterval(()=>updateLockDisplay(raw),1000); }
    else { document.getElementById('lock-display').innerHTML=''; }

    // Labels
    const libroTxt=paredFuerte?'PARED FUERTE':paredMedia?'PARED MEDIA':'LIVIANO';
    const libroCls=paredFuerte?'b-red':paredMedia?'b-yellow':'b-gray';
    const fundingCls=fundingLast>0.3?'b-red':fundingLast>0.05?'b-yellow':fundingLast<-0.05?'b-green':'b-gray';
    const fundingTxt=(fundingLast>=0?'+':'')+fundingLast.toFixed(4)+'%';
    let fundingSentido='';
    if(fundingLast>0.3) fundingSentido='longs pagan — agotamiento';
    else if(fundingLast>0.05) fundingSentido='longs pagan — señal techo';
    else if(fundingLast<-0.05) fundingSentido='shorts pagan — squeeze fuel';
    else fundingSentido='neutro';
    const stochCls=sobrecompraExtrema?'b-red':sobrecompra?'b-yellow':'b-gray';
    const divgTxt=divgCount===3?'1M+5M+15M':divgCount===2?'2 TFs':divgCount===1?'1 TF':'NO';
    const divgCls=divgCount>=2?'b-red':divgCount===1?'b-yellow':'b-gray';
    const cvd5Cls=cvd5Total>0?'b-green':'b-red';
    const cvd5Txt=(cvd5Total>=0?'+':'')+fmtBig(Math.abs(cvd5Total*price))+' USD';
    const limColor=lim.distPct>10?'var(--green)':lim.distPct>4?'var(--yellow)':'var(--red)';
    const limLabel=lim.distPct>10?'LEJOS':lim.distPct>4?'CERCANO':'MUY CERCA';
    const nowStr=new Date().toLocaleTimeString('es-AR');

    const liqMapHTML = liqData ? renderLiqMap(liqData.zonasArr, price) : '<div style="text-align:center;color:var(--muted);font-size:10px;padding:20px;">Sin datos de liquidaciones</div>';
    const libroHTML = renderLibroVisual(asks, bids, price);

    // liquidezLibre: color y texto correctos
    const liqLibreColor = lim.liquidezLibre>60?'var(--green)':lim.liquidezLibre>40?'var(--yellow)':'var(--red)';
    const liqLibreTxt   = lim.liquidezLibre>60?'camino despejado':lim.liquidezLibre>40?'resistencia moderada':'libro denso — techo cercano';

    document.getElementById('out').innerHTML=`

      <div class="price-row">
        <div class="price-num">${fmtP(price)}</div>
        <div class="price-meta">
          <span>${raw}USDT</span>
          <span class="price-ch ${ch24>=0?'pos':'neg'}">${ch24>=0?'+':''}${ch24.toFixed(2)}% 24h</span>
          <span>Vol $${fmtBig(vol24)}</span>
          ${oi>0?`<span>OI $${fmtBig(oi)}</span>`:''}
        </div>
      </div>

      <div class="techo-wrap">
        <div class="techo-hdr"><span>0% — inicio spike</span><span>TECHO 100%</span></div>
        <div class="techo-track">
          <div class="techo-fill" style="width:${Math.min(techoScore,100)}%;background:${fillColor}"></div>
        </div>
        <div class="techo-label" style="color:${fillColor}">
          ${techoScore}%
          <span style="font-size:14px;font-weight:400;color:var(--muted)">—</span>
          <span style="font-size:17px;">${techoText}</span>
        </div>
        <div class="techo-sub">
          <span>pump 24h ${ch24.toFixed(1)}%</span>
          <span>pump local ${pumpIntraday.toFixed(1)}%</span>
          <span>fund ${fundingTxt}</span>
          <span>stoch 1h ${stochK.toFixed(0)}%</span>
          ${divgCount>0?`<span class="hi">⚡ divg ${divgTxt}</span>`:'<span>sin div</span>'}
          ${liqData&&liqData.squeezeFuel?`<span class="bull">🎣 squeeze</span>`:''}
          ${liqData&&liqData.oiDistribucion?`<span class="hi">📉 OI cae</span>`:''}
          ${locked?'<span style="color:var(--accent)">🔒 locked</span>':''}
        </div>
      </div>

      <!-- ══ LIBRO VISUAL v6.1 ══ -->
      <div class="libro-box">
        <div class="libro-hdr">
          <span>📖 LIBRO DE ÓRDENES — BINANCE DEPTH</span>
          <span style="font-size:9px;color:var(--yellow);font-family:'IBM Plex Mono',monospace;">±5% PRECIO</span>
        </div>
        ${libroHTML}
      </div>

      <!-- ══ LIQUIDEZ BOX v6 ══ -->
      <div class="liq-box">
        <div class="liq-box-hdr">
          <span>🐋 ANÁLISIS DE LIQUIDEZ — BINANCE API</span>
          ${liqData?`<span style="font-size:9px;color:var(--green);font-family:'IBM Plex Mono',monospace;">LIVE</span>`:'<span style="font-size:9px;color:var(--muted);">N/A</span>'}
        </div>

        ${liqMapHTML}

        <div class="liq-grid" style="margin-top:10px;">
          <div class="liq-item">
            <div class="lval" style="color:var(--green)">${liqData?fmtBig(liqData.liqShortUSD):'—'}</div>
            <div class="llbl">shorts liquidados</div>
            <div class="lsub">${liqData?liqData.liqShortCount+' órdenes':''}</div>
          </div>
          <div class="liq-item">
            <div class="lval" style="color:var(--red)">${liqData?fmtBig(liqData.liqLongUSD):'—'}</div>
            <div class="llbl">longs liquidados</div>
            <div class="lsub">${liqData?liqData.liqLongCount+' órdenes':''}</div>
          </div>
          <div class="liq-item">
            <div class="lval" style="color:${liqData&&liqData.takerBullish?'var(--green)':liqData&&liqData.takerBearish?'var(--red)':'var(--muted)'}">${liqData?liqData.takerActual.toFixed(2)+'x':'—'}</div>
            <div class="llbl">taker buy/sell</div>
            <div class="lsub">${liqData?liqData.takerBullish?'compradores dominan':liqData.takerBearish?'vendedores dominan':'neutro':''}</div>
          </div>
          <div class="liq-item">
            <div class="lval" style="color:${liqData&&liqData.oiTendencia==='subiendo'?'var(--green)':liqData&&liqData.oiTendencia==='bajando'?'var(--red)':'var(--muted)'}">${liqData?(liqData.oiDelta>=0?'+':'')+liqData.oiDelta.toFixed(1)+'%':'—'}</div>
            <div class="llbl">OI delta (5m)</div>
            <div class="lsub">${liqData?liqData.oiTendencia:''}</div>
          </div>
        </div>

        <div class="ballena-status ${liqData?liqData.ballenaClase:'b-unknown'}" style="margin-top:10px;">
          <span class="ballena-icon">${liqData?liqData.ballenaIcon:'🐋❓'}</span>
          <div class="ballena-txt">
            <div class="btitle">${liqData?liqData.ballenaEstado:'SIN DATOS'}</div>
            <div class="bsub">${liqData?liqData.ballenaTxt:'Verificar conexión a Binance'}</div>
          </div>
        </div>
      </div>

      <!-- LIMIT BOX -->
      <div class="limit-box">
        <div class="limit-hdr">
          <span>PRECIO LÍMITE — ZONA DE TECHO ESTIMADA</span>
          <span class="badge-cyan">${limLabel}</span>
        </div>
        <div class="limit-grid">
          <div class="limit-item">
            <div class="lval" style="color:${limColor}">${fmtP(lim.limit)}</div>
            <div class="llbl">límite estimado</div>
            <div class="lsub">+${lim.distPct.toFixed(1)}% desde ahora</div>
          </div>
          <div class="limit-item">
            <div class="lval" style="color:var(--red)">${fmtP(lim.resistLevel)}</div>
            <div class="llbl">resistencia libro</div>
            <div class="lsub">bloque más denso ±8%</div>
          </div>
          <div class="limit-item">
            <div class="lval" style="color:var(--muted)">${fmtP(lim.atrTarget)}</div>
            <div class="llbl">ATR proyectado</div>
            <div class="lsub">min local + 2.5x ATR</div>
          </div>
          <div class="limit-item">
            <div class="lval" style="color:var(--purple)">${fmtP(lim.liqTarget)}</div>
            <div class="llbl">zona liq. shorts</div>
            <div class="lsub">${liqData&&liqData.zonasArr.length>0?'de API real':'high24 + buffer'}</div>
          </div>
          <div class="limit-item limit-full">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <div class="llbl">liquidez disponible arriba (bids vs asks ±3%)</div>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${liqLibreColor};">
                asks $${fmtBig(lim.askUSDClose)} · bids $${fmtBig(lim.bidUSDClose)}
              </span>
            </div>
            <div class="depth-bar">
              <div class="depth-fill" style="width:${lim.liquidezLibre.toFixed(0)}%;background:${liqLibreColor}"></div>
            </div>
            <div class="lsub" style="margin-top:4px;color:${liqLibreColor};">${lim.liquidezLibre.toFixed(0)}% bids — ${liqLibreTxt}</div>
          </div>
        </div>
      </div>

      ${techoExtremo?`<div class="alert alert-red"><span class="alert-icon">🚨</span><span>TECHO EXTREMO — Funding alto positivo + absorción + pump >100%.</span></div>`:''}
      ${liqData&&liqData.liqLongDominante&&liqData.oiDistribucion?`<div class="alert alert-red"><span class="alert-icon">🐋💨</span><span>BALLENA DISTRIBUYENDO — Longs siendo liquidados (${(100-liqData.pctShortLiq).toFixed(0)}%) y OI cae. La ballena ya llenó la panza.</span></div>`:''}
      ${liqData&&liqData.squeezeFuel?`<div class="alert alert-green"><span class="alert-icon">🎣</span><span>CAZANDO SHORTS — ${liqData.pctShortLiq.toFixed(0)}% de las liquidaciones son shorts. OI estable. La ballena sigue apretando.</span></div>`:''}
      ${liqData&&liqData.oiDistribucion&&!liqData.liqLongDominante?`<div class="alert alert-yellow"><span class="alert-icon">📉</span><span>OI CAYENDO con precio subiendo — señal de distribución. Monitorear takers.</span></div>`:''}
      ${fundingBullSqueeze&&!liqData?.liqLongDominante?`<div class="alert alert-cyan"><span class="alert-icon">ℹ️</span><span>FUNDING NEGATIVO — Shorts pagan a longs. Esperar agotamiento antes de shortear.</span></div>`:''}
      ${liqData&&liqData.absorcionCVD?`<div class="alert alert-yellow"><span class="alert-icon">🐋📤</span><span>ABSORCIÓN CVD — Takers perdiendo fuerza (${liqData.takerActual.toFixed(2)}x). La ballena absorbió el rally y vende silenciosamente.</span></div>`:''}
      ${liqData&&liqData.retailAtrapado?`<div class="alert alert-yellow"><span class="alert-icon">🐋👀</span><span>RETAIL ATRAPADO ARRIBA — Takers vendedores dominan. Funding positivo. Compradores retail pagando, ballena observa.</span></div>`:''}
      ${liqData&&liqData.agotamiento&&!liqData.absorcionCVD?`<div class="alert alert-yellow"><span class="alert-icon">🐋⏳</span><span>AGOTAMIENTO DETECTADO — Takers perdiendo fuerza. Esperar divergencia CVD para confirmar techo.</span></div>`:''}

      <div class="veredicto ${vCls}">
        <span class="v-icon">${vIcon}</span>
        ${vTxt}
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-val" style="color:${techoScore>=80?'var(--red)':techoScore>=55?'var(--yellow)':techoScore>=25?'var(--green)':'var(--muted)'}">${techoScore}%</div>
          <div class="card-lbl">score</div>
        </div>
        <div class="card">
          <div class="card-val" style="color:${señalesTecho>=5?'var(--red)':señalesTecho>=3?'var(--yellow)':señalesTecho>=2?'var(--orange)':'var(--muted)'}">${señalesTecho}/11</div>
          <div class="card-lbl">señales</div>
        </div>
        <div class="card">
          <div class="card-val" style="color:${stochK>=95?'var(--red)':stochK>=85?'var(--yellow)':'var(--muted)'}">${stochK.toFixed(0)}%</div>
          <div class="card-lbl">stoch 1h</div>
        </div>
        <div class="card">
          <div class="card-val" style="color:${liqData&&liqData.liqLongDominante?'var(--red)':liqData&&liqData.squeezeFuel?'var(--green)':'var(--muted)'}">${liqData?liqData.pctShortLiq.toFixed(0)+'%':'—'}</div>
          <div class="card-lbl">liq shorts</div>
        </div>
      </div>

      <p class="section-title">SEÑALES DE TECHO</p>
      <div class="qs">
        <div class="q">
          <div class="q-left">
            <span class="q-txt">¿La ballena absorbió el libro?</span>
            <span class="q-hint">CVD 1m vs resistencia · ${absorb.toFixed(0)}% absorbido</span>
          </div>
          <span class="badge ${sinLibro?'b-red':'b-gray'}">${sinLibro?'SÍ — '+absorb.toFixed(0)+'%':'NO — '+absorb.toFixed(0)+'%'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">Divergencia CVD/precio (multi-TF)</span>
            <span class="q-hint">5m principal · 15m confirma · 1m ruido</span>
          </div>
          <span class="badge ${divgCls}">${divgTxt}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">CVD acumulado 5m</span>
            <span class="q-hint">${acelerando5?'Acelerando':desacelerando5?'Desacelerando':'Neutro'}</span>
          </div>
          <span class="badge ${cvd5Cls}">${cvd5Txt}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">Stocástico 1h</span>
            <span class="q-hint">${sobrecompraExtrema?'EXTREMO >95%':sobrecompra?'SOBRECOMPRA >85%':'Normal'}</span>
            <div class="stoch-bar"><div class="stoch-fill" style="width:${stochK.toFixed(0)}%;background:${stochK>=95?'var(--red)':stochK>=85?'var(--yellow)':'var(--green)'}"></div></div>
          </div>
          <span class="badge ${stochCls}">${stochK.toFixed(0)}%</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">¿Volumen de compra cayendo?</span>
            <span class="q-hint">Últimas 3 vs 6 velas anteriores (1m)</span>
          </div>
          <span class="badge ${volCayendo?'b-yellow':'b-gray'}">${volCayendo?'CAYENDO':'SOSTENIDO'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">Funding — dirección</span>
            <span class="q-hint">${fundingSentido}</span>
          </div>
          <span class="badge ${fundingCls}">${fundingTxt}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">¿Pared activa arriba? (±8%)</span>
            <span class="q-hint">Ratio asks/bids ±8% · ${ratio.toFixed(1)}x · pared en ${fmtP(lim.resistLevel)}</span>
          </div>
          <span class="badge ${libroCls}">${libroTxt}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">Takers — presión real de mercado</span>
            <span class="q-hint">Buy/sell ratio último periodo 5m</span>
          </div>
          <span class="badge ${liqData?liqData.takerBullish?'b-green':liqData.takerBearish?'b-red':'b-gray':'b-gray'}">${liqData?liqData.takerActual.toFixed(2)+'x':'—'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">OI histórico — ¿subiendo con precio?</span>
            <span class="q-hint">Baja con precio sube = distribución ballena</span>
          </div>
          <span class="badge ${liqData?liqData.oiDistribucion?'b-red':liqData.oiTendencia==='subiendo'?'b-green':'b-gray':'b-gray'}">${liqData?(liqData.oiDelta>=0?'+':'')+liqData.oiDelta.toFixed(1)+'% '+liqData.oiTendencia:'—'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">🐋 ¿Ballena llenó la panza?</span>
            <span class="q-hint">Liq shorts vs longs + OI + takers</span>
          </div>
          <span class="badge ${liqData?liqData.liqLongDominante?'b-red':liqData.squeezeFuel?'b-green':'b-gray':'b-gray'}">${liqData?liqData.liqLongDominante?'PANZA LLENA':liqData.squeezeFuel?'SIGUE CAZANDO':'NEUTRO':'—'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">¿Volumen institucional presente?</span>
            <span class="q-hint">${(vol3/volAvg).toFixed(1)}x actual · >1.5x activa</span>
          </div>
          <span class="badge ${volInstitucional?'b-purple':'b-gray'}">${volInstitucional?'SÍ — '+(vol3/volAvg).toFixed(1)+'x':'NO'}</span>
        </div>
        <div class="q">
          <div class="q-left">
            <span class="q-txt">🔒 Memoria de señal</span>
            <span class="q-hint">Lock ${LOCK_MINUTES}min — no baja si precio no sube +2%</span>
          </div>
          <span class="badge ${locked?'b-red':'b-gray'}">${locked?'LOCKED':'LIBRE'}</span>
        </div>
      </div>
    `;

    document.getElementById('bl').textContent=raw+'USDT · '+nowStr;

  } catch(e){
    document.getElementById('out').innerHTML='<div class="err">ERROR: '+e.message+'</div>';
  }
  btn.disabled=false; btn.textContent='ANALIZAR';
}
</script>
</body>
</html>
